<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>教师AI备课助手 - 山东工业技师学院线上课堂</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f5fa;min-height:100vh;display:flex;flex-direction:column}
/* 顶部导航 */
.top-bar{background:linear-gradient(135deg,#1a3a5c,#2a5a8c);color:#fff;padding:12px 24px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 12px rgba(26,58,92,.3)}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:#fff;text-decoration:none;font-size:15px;padding:6px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.3);transition:all .2s}
.back-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.5)}
.top-bar h1{font-size:18px;font-weight:700;flex:1;text-align:center;padding-right:80px}
/* Hero区域 */
.hero{background:linear-gradient(135deg,#1a3a5c 0%,#2a6ab0 40%,#4a90d9 100%);padding:48px 24px 40px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;right:-20%;width:500px;height:500px;background:radial-gradient(circle,rgba(255,255,255,.08) 0%,transparent 70%);border-radius:50%}
.hero::after{content:'';position:absolute;bottom:-30%;left:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(255,255,255,.05) 0%,transparent 70%);border-radius:50%}
.hero-icon{font-size:64px;margin-bottom:12px;display:block;position:relative;z-index:1}
.hero h2{font-size:30px;color:#fff;font-weight:800;margin-bottom:8px;position:relative;z-index:1;text-shadow:0 2px 8px rgba(0,0,0,.2)}
.hero p{font-size:16px;color:rgba(255,255,255,.85);position:relative;z-index:1;max-width:600px;margin:0 auto 20px;line-height:1.6}
.hero-tags{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;position:relative;z-index:1}
.hero-tag{background:rgba(255,255,255,.18);color:#fff;padding:6px 16px;border-radius:20px;font-size:13px;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.2)}
/* 主内容区 */
.main{flex:1;display:flex;flex-direction:column;align-items:center;padding:40px 24px}
/* 聊天容器 */
.chat-box{width:100%;max-width:800px;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);overflow:hidden;margin-bottom:24px}
.chat-header{background:linear-gradient(135deg,#2a6ab0,#4a90d9);color:#fff;padding:16px 24px;display:flex;align-items:center;gap:12px}
.chat-ava{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:22px}
.chat-header-info h3{font-size:16px;font-weight:700}
.chat-header-info p{font-size:12px;opacity:.8;margin-top:2px}
.chat-body{height:420px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#f8fbff 0%,#edf3fa 100%);position:relative}
.chat-placeholder{text-align:center;padding:40px}
.chat-placeholder-icon{font-size:72px;margin-bottom:16px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.chat-placeholder h3{font-size:20px;color:#1a3a5c;margin-bottom:8px}
.chat-placeholder p{font-size:14px;color:#6b7f99;margin-bottom:24px;line-height:1.6}
.chat-start-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#2a6ab0,#4a90d9);color:#fff;border:none;padding:14px 36px;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;transition:all .3s;box-shadow:0 4px 16px rgba(42,106,176,.35)}
.chat-start-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(42,106,176,.45)}
.chat-start-btn:active{transform:translateY(0)}
.chat-loading{position:absolute;top:0;left:0;right:0;bottom:0;display:none;align-items:center;justify-content:center;background:rgba(248,251,255,.95);z-index:2}
.chat-loading.active{display:flex}
.chat-loading-text{font-size:15px;color:#6b7f99}
.chat-loading-text::after{content:'...';animation:dots 1.5s steps(3) infinite}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
/* COZE按钮区 */
.coze-section{width:100%;max-width:800px;text-align:center;padding:16px 0 40px}
.coze-btn{display:inline-flex;align-items:center;gap:10px;background:#fff;color:#1a3a5c;border:2px solid #2a6ab0;padding:14px 32px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s;text-decoration:none;box-shadow:0 2px 12px rgba(42,106,176,.12)}
.coze-btn:hover{background:#2a6ab0;color:#fff;transform:translateY(-2px);box-shadow:0 4px 20px rgba(42,106,176,.3)}
.coze-btn svg{width:20px;height:20px;fill:currentColor}
/* 响应式 */
@media(max-width:640px){
  .hero{padding:32px 16px 24px}
  .hero h2{font-size:22px}
  .hero p{font-size:14px}
  .chat-body{height:350px}
  .main{padding:24px 12px}
  .top-bar h1{font-size:15px;padding-right:60px}
}
</style>
</head>
<body>
<!-- 顶部导航 -->
<div class="top-bar">
  <a class="back-btn" href="index.html">← 返回首页</a>
  <h1>教师AI备课助手</h1>
</div>

<!-- Hero区域 -->
<section class="hero">
  <span class="hero-icon">👨‍🏫</span>
  <h2>计算机网络应用专业教师助手</h2>
  <p>智能辅助教师备课，自动生成教案、题库、课件内容，提升教学效率</p>
  <div class="hero-tags">
    <span class="hero-tag">📚 教案生成</span>
    <span class="hero-tag">📝 题库出题</span>
    <span class="hero-tag">📊 课件制作</span>
    <span class="hero-tag">🎯 教学设计</span>
  </div>
</section>

<!-- 主内容区 -->
<div class="main">
  <!-- 聊天窗口 -->
  <div class="chat-box">
    <div class="chat-header">
      <div class="chat-ava">🤖</div>
      <div class="chat-header-info">
        <h3>教师AI备课助手</h3>
        <p>在线 · 随时为您服务</p>
      </div>
    </div>
    <div class="chat-body" id="chatBody">
      <div class="chat-placeholder">
        <span class="chat-placeholder-icon">💬</span>
        <h3>开始与AI备课助手对话</h3>
        <p>点击下方按钮打开对话窗口<br>支持教案生成、题库出题、课件制作等</p>
        <button class="chat-start-btn" onclick="openChat()">
          💬 开始对话
        </button>
      </div>
      <div class="chat-loading" id="chatLoading">
        <span class="chat-loading-text">正在打开对话窗口</span>
      </div>
    </div>
  </div>

  <!-- COZE官方入口 -->
  <div class="coze-section">
    <p style="color:#6b7f99;margin-bottom:12px;font-size:14px">也可以直接访问COZE官方智能体平台</p>
    <a class="coze-btn" href="https://www.coze.cn/s/xqfU3sWIPLI/" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
      进入COZE官方智能体
    </a>
  </div>
</div>

<script>
function openChat(){
  var loading=document.getElementById('chatLoading');
  loading.classList.add('active');
  // 打开Coze对话页面
  var w=window.open('https://www.coze.cn/s/xqfU3sWIPLI/','coze_teacher_chat','width=480,height=720,scrollbars=yes,resizable=yes,menubar=no,toolbar=no,location=no,status=no');
  // 延迟隐藏loading
  setTimeout(function(){loading.classList.remove('active')},1500);
  // 如果弹窗被拦截，提示用户
  if(!w||w.closed||typeof w.closed==='undefined'){
    loading.classList.remove('active');
    // 弹窗被拦截，改为新标签页打开
    window.open('https://www.coze.cn/s/xqfU3sWIPLI/','_blank');
  }
}
</script>
</body>
</html>
