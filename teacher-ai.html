<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>教师AI备课助手 - 山东工业技师学院线上课堂</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f0f4f8;height:100vh;display:flex;flex-direction:column}
.topbar{background:linear-gradient(135deg,#1e3a5f,#2c5282);color:#fff;padding:12px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar a{color:#fff;text-decoration:none;font-size:14px;padding:6px 14px;border:1px solid rgba(255,255,255,.3);border-radius:6px;transition:all .2s}
.topbar a:hover{background:rgba(255,255,255,.15)}
.topbar h1{font-size:18px;font-weight:600;flex:1}
.bot-tag{font-size:12px;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:12px}
.chat-wrap{flex:1;display:flex;flex-direction:column;max-width:900px;width:100%;margin:0 auto;padding:16px;overflow:hidden}
.msgs{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:10px;max-width:85%;animation:fadeIn .3s ease}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.msg.bot .msg-avatar{background:linear-gradient(135deg,#2c5282,#4299e1)}
.msg.user .msg-avatar{background:linear-gradient(135deg,#48bb78,#38a169)}
.msg-bubble{padding:12px 16px;border-radius:16px;line-height:1.7;font-size:15px;word-break:break-word;position:relative}
.msg.bot .msg-bubble{background:#fff;color:#2d3748;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.msg.user .msg-bubble{background:linear-gradient(135deg,#2c5282,#4299e1);color:#fff;border-bottom-right-radius:4px}
.msg-thinking{color:#8a9bb0;font-size:13px;line-height:1.6;margin-bottom:8px;padding:8px 10px;background:rgba(255,255,255,0.6);border-radius:6px;border-left:3px solid #a0c4ff;max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.msg-thinking-toggle{color:#5a7bad;font-size:12px;cursor:pointer;margin-bottom:6px;display:flex;align-items:center;gap:4px;user-select:none}
.msg-thinking-toggle:hover{color:#3a5a8a}
.msg-thinking-toggle .arrow{display:inline-block;transition:transform .2s}
.msg-thinking-toggle .arrow.collapsed{transform:rotate(-90deg)}
.msg-thinking-wrap{margin-bottom:8px}
.msg-thinking-wrap .msg-thinking{display:none}
.msg-thinking-wrap.expanded .msg-thinking{display:block}
.msg-thinking-wrap.collapsed .msg-thinking{display:none}
.typing-cursor::after{content:'▊';animation:blink 1s infinite;color:#4299e1}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.welcome{background:linear-gradient(135deg,#ebf4ff,#e2e8f0);border-radius:16px;padding:24px;margin-bottom:12px;text-align:center}
.welcome h2{color:#1e3a5f;font-size:20px;margin-bottom:8px}
.welcome p{color:#4a5568;font-size:14px;line-height:1.6;margin-bottom:12px}
.welcome-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.welcome-tag{background:#fff;color:#2c5282;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .2s;border:1px solid #bee3f8}
.welcome-tag:hover{background:#2c5282;color:#fff}
.input-area{padding:12px 0;display:flex;gap:10px;flex-shrink:0}
.input-area input{flex:1;padding:12px 18px;border:2px solid #e2e8f0;border-radius:24px;font-size:15px;outline:none;transition:border-color .2s}
.input-area input:focus{border-color:#4299e1}
.input-area button{padding:12px 24px;background:linear-gradient(135deg,#2c5282,#4299e1);color:#fff;border:none;border-radius:24px;font-size:15px;cursor:pointer;transition:all .2s;font-weight:600}
.input-area button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(44,82,130,.3)}
.input-area button:disabled{opacity:.5;cursor:not-allowed;transform:none}
.bottom-bar{padding:10px 16px;text-align:center;flex-shrink:0}
.coze-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;background:linear-gradient(135deg,#2c5282,#4299e1);color:#fff;text-decoration:none;border-radius:24px;font-size:14px;font-weight:600;transition:all .2s;box-shadow:0 2px 8px rgba(44,82,130,.2)}
.coze-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(44,82,130,.35)}
@media(max-width:640px){
  .topbar{padding:10px 16px}
  .topbar h1{font-size:15px}
  .chat-wrap{padding:10px}
  .msg{max-width:92%}
  .welcome h2{font-size:17px}
}
.sync-feishu-btn{display:inline-block;margin-top:8px;padding:4px 12px;border:1px solid #4299e1;border-radius:16px;background:#ebf8ff;color:#2c5282;font-size:12px;cursor:pointer;transition:all .2s}
.sync-feishu-btn:hover{background:#bee3f8}
.feishu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
.feishu-overlay.show{display:flex}
.feishu-modal-box{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:420px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.feishu-modal-box h3{margin:0 0 16px;font-size:18px;color:#1e3a5f}
.feishu-modal-box label{display:block;font-size:13px;color:#555;margin:12px 0 4px;font-weight:600}
.feishu-modal-box select,.feishu-modal-box textarea{width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;box-sizing:border-box}
.feishu-modal-box textarea{min-height:60px;resize:vertical}
.feishu-btns{display:flex;gap:10px;margin-top:18px}
.feishu-btns button{flex:1;padding:10px;border-radius:8px;font-size:14px;cursor:pointer;border:none;font-weight:600}
.feishu-btns .btn-cancel{background:#edf2f7;color:#4a5568}
.feishu-btns .btn-confirm{background:#4299e1;color:#fff}
.feishu-btns .btn-confirm:hover{background:#3182ce}
.sync-toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:1001;box-shadow:0 4px 12px rgba(0,0,0,.2);animation:fadeIn .2s}
.sync-toast.show{display:block}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">&larr; 返回首页</a>
  <h1>教师AI备课助手</h1>
  <span class="bot-tag">在线</span>
</div>
<div class="chat-wrap">
  <div class="msgs" id="msgs">
    <div class="welcome">
      <h2>计算机网络应用专业教师助手</h2>
      <p>输入课程主题，按工学一体化标准自动生成完整教案+配套PPT文字内容，覆盖17门专业课程</p>
      <div class="welcome-tags">
        <span class="welcome-tag" onclick="sendQuick('帮我生成《网络设备配置与管理》课程的教案')">网络设备配置教案</span>
        <span class="welcome-tag" onclick="sendQuick('生成《综合布线技术》课程的PPT大纲')">综合布线PPT</span>
        <span class="welcome-tag" onclick="sendQuick('帮我设计《网络安全技术》课堂活动')">网络安全课堂活动</span>
      </div>
    </div>
  </div>
  <div class="input-area">
    <input id="input" type="text" placeholder="输入课程主题或教学需求..." onkeydown="if(event.key==='Enter')send()">
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
  <div class="bottom-bar">
    <a class="coze-btn" href="https://www.coze.cn/s/xqfU3sWIPLI/" target="_blank">进入COZE官方智能体 &rarr;</a>
  </div>
</div>
<script>
const BOT_ID='7645541370291699731';
const API_URL='https://api.coze.cn/v3/chat';
const TOKEN='sat_5fSxGjaYFMpx9nSlIhXwt9mCAxKUKtJbaEwfyCIW9lSewRnHKSa4Qs5QEg5Zr0RZ';
let userId='u_'+Math.random().toString(36).substr(2,8);
let conversationId=null;
let isStreaming=false;

function addMsg(role,html){
  const d=document.createElement('div');
  d.className='msg '+role;
  d.innerHTML=`<div class="msg-avatar">${role==='bot'?'🤖':'👤'}</div><div class="msg-bubble">${html}</div>`;
  document.getElementById('msgs').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
  return d;
}

function scrollBottom(){
  const m=document.getElementById('msgs');
  m.scrollTop=m.scrollHeight;
}

async function send(){
  const input=document.getElementById('input');
  const text=input.value.trim();
  if(!text||isStreaming)return;
  input.value='';
  isStreaming=true;
  document.getElementById('sendBtn').disabled=true;
  addMsg('user',escHtml(text));
  const botDiv=addMsg('bot','<span class="typing-cursor">思考中...</span>');
  const bubble=botDiv.querySelector('.msg-bubble');
  let answerText='';
  let thinkingText='';
  let hasAnswer=false;

  try{
    const body={bot_id:BOT_ID,user_id:userId,stream:true,auto_save_history:true,additional_messages:[{role:'user',content:text,content_type:'text'}]};
    if(conversationId)body.conversation_id=conversationId;
    const resp=await fetch(API_URL,{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify(body)});
    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let buf='';

    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      buf+=decoder.decode(value,{stream:true});
      const lines=buf.split('\n');
      buf=lines.pop();

      let currentEvent='';
      for(const line of lines){
        // Parse SSE event type line
        if(line.startsWith('event:')){
          currentEvent=line.slice(6).trim();
          continue;
        }
        if(!line.startsWith('data:'))continue;
        const data=line.slice(5).trim();
        if(!data||data==='[DONE]')continue;
        try{
          const obj=JSON.parse(data);
          // Save conversation_id
          if(obj.conversation_id&&!conversationId)conversationId=obj.conversation_id;

          // conversation.message.delta - streaming incremental content
          if(currentEvent==='conversation.message.delta'){
            if(obj.type==='answer'){
              hasAnswer=true;
              if(obj.content)answerText+=obj.content;
            }else if(obj.type==='verbose'&&obj.content){
              thinkingText+=obj.content;
            }
          }
          // conversation.message.completed - final complete message
          if(currentEvent==='conversation.message.completed'){
            if(obj.type==='answer'&&obj.content){
              // Use completed content as the authoritative full text
              answerText=obj.content;
              hasAnswer=true;
            }
          }

          // Update display
          let html='';
          if(thinkingText){
            // Show thinking process with toggle
            html+=`<div class="msg-thinking-wrap expanded" id="tw-${msgId}">`;
            html+=`<div class="msg-thinking-toggle" onclick="toggleThinking('tw-${msgId}')"><span class="arrow">▼</span> 💭 思考过程...</div>`;
            html+=`<div class="msg-thinking">${escHtml(thinkingText)}</div>`;
            html+=`</div>`;
          }
          if(answerText){
            html+=formatMsg(answerText);
          }else{
            html+='<span class="typing-cursor">等待回答中...</span>';
          }
          bubble.innerHTML=html;
          scrollBottom();
        }catch(e){}
      }
    }
    // Final display
    let finalHtml='';
    if(thinkingText){
      finalHtml+=`<div class="msg-thinking-wrap collapsed" id="tw-${msgId}">`;
      finalHtml+=`<div class="msg-thinking-toggle" onclick="toggleThinking('tw-${msgId}')"><span class="arrow collapsed">▼</span> 💭 思考过程（点击展开）</div>`;
      finalHtml+=`<div class="msg-thinking">${escHtml(thinkingText)}</div>`;
      finalHtml+=`</div>`;
    }
    finalHtml+=answerText?formatMsg(answerText):'抱歉，未获取到回复，请重试。';
    if(answerText)finalHtml+=`<button class="sync-feishu-btn" onclick="openFeishuModal(this)">📤 同步到飞书</button>`;
    bubble.innerHTML=finalHtml;
    scrollBottom();
  }catch(e){
    bubble.innerHTML='⚠️ 网络错误，请稍后重试。也可<a href="https://www.coze.cn/s/xqfU3sWIPLI/" target="_blank" style="color:#4299e1">点击进入COZE官方智能体</a>';
    console.error(e);
  }
  isStreaming=false;
  document.getElementById('sendBtn').disabled=false;
  input.focus();
}

function sendQuick(text){
  document.getElementById('input').value=text;
  send();
}

function toggleThinking(id){
  const wrap=document.getElementById(id);
  const arrow=wrap.querySelector('.arrow');
  if(wrap.classList.contains('expanded')){
    wrap.classList.remove('expanded');wrap.classList.add('collapsed');
    arrow.classList.add('collapsed');
  }else{
    wrap.classList.remove('collapsed');wrap.classList.add('expanded');
    arrow.classList.remove('collapsed');
  }
}
function escHtml(s){
  const d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML.replace(/\n/g,'<br>');
}

function formatMsg(text){
  // Simple markdown-like formatting
  let html=escHtml(text);
  // Bold: **text**
  html=html.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  // Headers: ### text
  html=html.replace(/^### (.+)$/gm,'<div style="font-size:16px;font-weight:700;margin:8px 0 4px;color:#1e3a5f">$1</div>');
  html=html.replace(/^## (.+)$/gm,'<div style="font-size:17px;font-weight:700;margin:10px 0 4px;color:#1e3a5f">$1</div>');
  // Lists: - item or * item
  html=html.replace(/^[-*] (.+)$/gm,'<div style="padding-left:16px;margin:2px 0">• $1</div>');
  // Numbered lists: 1. item
  html=html.replace(/^(\d+)\. (.+)$/gm,'<div style="padding-left:16px;margin:2px 0">$1. $2</div>');
  return html;
}

/* ========== 飞书自动同步功能 ========== */
const TEACHER_COURSE_MAP={cable:'综合布线系统',net:'网络基础',route:'路由交换技术',security:'网络安全',server:'服务器配置',wireless:'无线网络',program:'网络编程',fiber:'光纤技术',linux:'Linux系统管理'};
let feishuContent='';
let feishuSyncing=false;

function openFeishuModal(btn){
  const bubble=btn.closest('.msg-bubble');
  feishuContent=bubble.textContent.replace('📤 同步到飞书','').trim().slice(0,1200);
  document.getElementById('feishuOverlay').classList.add('show');
  document.getElementById('fsCourse').value='net';
  document.getElementById('fsNote').value='';
}
function closeFeishu(){document.getElementById('feishuOverlay').classList.remove('show');}

async function doSyncFeishu(){
  if(feishuSyncing)return;
  feishuSyncing=true;
  closeFeishu();
  showToast('📤 正在同步备课内容到飞书...','syncing');
  const course=document.getElementById('fsCourse').value;
  const courseName=TEACHER_COURSE_MAP[course]||course;
  const note=document.getElementById('fsNote').value.trim();
  const now=new Date().toLocaleString('zh-CN');
  const msg=`【备课记录同步】\n时间：${now}\n来源：教师AI备课助手\n课程：${courseName}\n备课内容：\n${feishuContent}${note?'\n补充说明：'+note:''}\n\n请将此备课记录写入飞书多维表格。`;

  try{
    const body={
      bot_id:BOT_ID,
      user_id:'feishu_sync_'+(localStorage.getItem('feishuUid')||('u_'+Math.random().toString(36).substr(2,8))),
      stream:false,
      auto_save_history:true,
      additional_messages:[{role:'user',content:msg,content_type:'text'}]
    };
    const resp=await fetch(API_URL,{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!resp.ok)throw new Error('API错误:'+resp.status);
    const data=await resp.json();
    if(data.code===0&&data.data){
      const chatId=data.data.id;
      const convId=data.data.conversation_id;
      const success=await pollChatResult(chatId,convId);
      showToast(success?'✅ 备课内容已同步到飞书':'⚠️ 同步可能失败，请稍后检查','success');
    }else{
      showToast('⚠️ 飞书同步失败','error');
    }
  }catch(e){
    console.error('飞书同步异常:',e);
    showToast('⚠️ 飞书同步异常','error');
  }
  feishuSyncing=false;
}

async function pollChatResult(chatId,convId){
  for(let i=0;i<15;i++){
    await new Promise(r=>setTimeout(r,5000));
    try{
      const resp=await fetch(`https://api.coze.cn/v3/chat/retrieve?chat_id=${chatId}&conversation_id=${convId}`,{headers:{'Authorization':'Bearer '+TOKEN}});
      const data=await resp.json();
      if(data.code===0&&data.data){
        if(data.data.status==='completed')return true;
        if(data.data.status==='failed')return false;
      }
    }catch(e){console.error('轮询异常:',e);}
  }
  return false;
}

function showToast(msg,type){
  let el=document.getElementById('syncToast');
  const colors={success:'background:#48bb78',error:'background:#e53e3e',syncing:'background:#4299e1'};
  el.style.cssText=colors[type]||colors.syncing;
  el.textContent=msg;
  el.classList.add('show');
  if(type!=='syncing'){setTimeout(()=>{el.classList.remove('show');},3000);}
}
</script>

<div class="feishu-overlay" id="feishuOverlay">
  <div class="feishu-modal-box">
    <h3>📤 同步备课内容到飞书</h3>
    <label>课程</label>
    <select id="fsCourse">
      <option value="net">网络基础</option>
      <option value="route">路由交换技术</option>
      <option value="cable">综合布线系统</option>
      <option value="security">网络安全</option>
      <option value="server">服务器配置</option>
      <option value="wireless">无线网络</option>
      <option value="program">网络编程</option>
      <option value="fiber">光纤技术</option>
      <option value="linux">Linux系统管理</option>
    </select>
    <label>补充说明（可选）</label>
    <textarea id="fsNote" placeholder="补充说明..."></textarea>
    <div class="feishu-btns">
      <button class="btn-cancel" onclick="closeFeishu()">取消</button>
      <button class="btn-confirm" onclick="doSyncFeishu()">📤 自动同步到飞书</button>
    </div>
  </div>
</div>
<div class="sync-toast" id="syncToast">📤 同步中...</div>

</body>
</html>
