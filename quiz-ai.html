<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>题库练习AI助手 - 山东工业技师学院线上课堂</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f5fa;min-height:100vh;display:flex;flex-direction:column}
/* 顶部导航 */
.top-bar{background:linear-gradient(135deg,#5c3a1a,#8c5a2a);color:#fff;padding:12px 24px;display:flex;align-items:center;gap:16px;box-shadow:0 2px 12px rgba(92,58,26,.3)}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:#fff;text-decoration:none;font-size:15px;padding:6px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.3);transition:all .2s}
.back-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.5)}
.top-bar h1{font-size:18px;font-weight:700;flex:1;text-align:center;padding-right:80px}
/* 主布局：左右分栏 */
.split{flex:1;display:flex;overflow:hidden}
/* 左侧：题库练习 */
.left-panel{flex:3;background:#fff;border-right:1px solid #e0e8f0;display:flex;flex-direction:column;overflow:hidden}
.left-hd{background:linear-gradient(135deg,#e85d04,#f59e0b);color:#fff;padding:16px 24px;display:flex;align-items:center;gap:12px}
.left-hd h2{font-size:18px;font-weight:700}
.left-hd .score{margin-left:auto;font-size:14px;background:rgba(255,255,255,.2);padding:4px 14px;border-radius:12px}
.left-bd{flex:1;overflow-y:auto;padding:20px 24px}
/* 课程选择卡片 */
.sel-card{background:#f8fbff;border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid #e0e8f0}
.sel-card h3{font-size:15px;color:#1a3a5c;margin-bottom:10px;font-weight:700}
.sel-opts{display:flex;flex-wrap:wrap;gap:8px}
.sel-opt{padding:8px 16px;border-radius:8px;border:1px solid #d0e0f0;background:#fff;cursor:pointer;font-size:14px;transition:all .2s;color:#4a6a8a}
.sel-opt:hover{border-color:#e85d04;color:#e85d04}
.sel-opt.active{background:#e85d04;color:#fff;border-color:#e85d04;font-weight:700}
.start-btn{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#e85d04,#f59e0b);color:#fff;font-size:17px;font-weight:700;cursor:pointer;transition:all .3s;box-shadow:0 4px 16px rgba(232,93,4,.25)}
.start-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,93,4,.35)}
/* 练习区域 */
.quiz-area{display:none}
.quiz-progress{height:6px;background:#e0e8f0;border-radius:3px;margin-bottom:16px;overflow:hidden}
.quiz-progress-bar{height:100%;background:linear-gradient(90deg,#e85d04,#f59e0b);border-radius:3px;transition:width .3s}
.quiz-qnum{font-size:13px;color:#8a9ab0;margin-bottom:8px}
.quiz-qtext{font-size:17px;color:#1a3a5c;font-weight:600;margin-bottom:16px;line-height:1.6}
.quiz-qopts{display:flex;flex-direction:column;gap:10px}
.qopt{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:10px;border:1.5px solid #e0e8f0;cursor:pointer;transition:all .2s;background:#fff}
.qopt:hover{border-color:#e85d04;background:#fff8f0}
.qopt-label{width:28px;height:28px;border-radius:50%;background:#f0f5fa;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#4a6a8a;flex-shrink:0}
.qopt-text{font-size:15px;color:#3a5a7a;line-height:1.5;padding-top:3px}
.qopt.correct{border-color:#16a34a;background:#f0fdf4}
.qopt.correct .qopt-label{background:#16a34a;color:#fff}
.qopt.wrong{border-color:#dc2626;background:#fef2f2}
.qopt.wrong .qopt-label{background:#dc2626;color:#fff}
.qopt.disabled{pointer-events:none;opacity:.85}
.feedback{margin-top:16px;padding:14px;border-radius:10px;font-size:14px;line-height:1.6;display:none}
.feedback.correct{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;display:block}
.feedback.wrong{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;display:block}
.qnav{margin-top:16px;display:none;justify-content:flex-end}
.qnav-btn{padding:10px 24px;border:none;border-radius:8px;background:linear-gradient(135deg,#e85d04,#f59e0b);color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.qnav-btn:hover{transform:translateY(-1px)}
/* 成绩 */
.result{text-align:center;padding:32px 0}
.result-score{font-size:56px;font-weight:800;line-height:1}
.result-unit{font-size:20px;font-weight:400}
.result-grade{font-size:22px;font-weight:700;margin:8px 0}
.result-info{font-size:14px;color:#6b7f99;margin-bottom:20px}
.result-btns{display:flex;justify-content:center;gap:12px}
/* 右侧：AI助手 */
.right-panel{flex:2;background:#f8fbff;display:flex;flex-direction:column;overflow:hidden;min-width:300px}
.right-hd{background:linear-gradient(135deg,#e85d04,#f59e0b);color:#fff;padding:16px 24px;display:flex;align-items:center;gap:12px}
.right-hd h2{font-size:18px;font-weight:700}
.right-bd{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;position:relative}
.ai-placeholder{text-align:center}
.ai-placeholder-icon{font-size:64px;margin-bottom:16px;display:block;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.ai-placeholder h3{font-size:18px;color:#5c3a1a;margin-bottom:8px}
.ai-placeholder p{font-size:13px;color:#8a7a6a;margin-bottom:20px;line-height:1.6}
.ai-start-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#e85d04,#f59e0b);color:#fff;border:none;padding:12px 28px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s;box-shadow:0 4px 16px rgba(232,93,4,.25)}
.ai-start-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(232,93,4,.35)}
.ai-loading{position:absolute;top:0;left:0;right:0;bottom:0;display:none;align-items:center;justify-content:center;background:rgba(248,251,255,.95);z-index:2}
.ai-loading.active{display:flex}
.ai-loading-text{font-size:15px;color:#8a7a6a}
.ai-loading-text::after{content:'...';animation:dots 1.5s steps(3) infinite}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
/* COZE按钮 */
.coze-link{margin-top:24px;padding:12px 24px;border:2px solid #e85d04;border-radius:10px;color:#e85d04;font-weight:700;font-size:14px;text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.coze-link:hover{background:#e85d04;color:#fff}
.coze-link svg{width:16px;height:16px;fill:currentColor}
/* 响应式：手机端上下布局 */
@media(max-width:768px){
  .split{flex-direction:column}
  .left-panel{flex:none;height:55vh;border-right:none;border-bottom:1px solid #e0e8f0}
  .right-panel{flex:1;min-width:auto}
  .top-bar h1{font-size:15px;padding-right:60px}
}
</style>
</head>
<body>
<!-- 顶部导航 -->
<div class="top-bar">
  <a class="back-btn" href="index.html">← 返回首页</a>
  <h1>题库练习 & AI助手</h1>
</div>

<div class="split">
  <!-- 左侧：题库练习 -->
  <div class="left-panel">
    <div class="left-hd">
      <h2>📝 智能题库练习</h2>
      <span class="score" id="scoreDisplay">得分：0</span>
    </div>
    <div class="left-bd" id="leftBd">
      <!-- 选择区域 -->
      <div class="sel-area" id="selArea">

          <b>💡 使用提示：</b>选择课程和难度后点击"开始练习"，即可在线答题。右侧AI助手可帮你生成新试卷。

      <div class="quiz-area" id="quizArea">

        <div class="feedback" id="feedback"></div>
        <div class="qnav" id="qnav"></div>

    </div>
  </div>

  <!-- 右侧：AI助手 -->
  <div class="right-panel">
    <div class="right-hd">
      <h2>🤖 题库AI助手</h2>
    </div>
    <div class="right-bd" id="aiBody">
      <div class="ai-placeholder">
        <span class="ai-placeholder-icon">💬</span>
        <h3>AI出题助手</h3>
        <p>自动生成试卷、出题、解析<br>支持Word试卷下载</p>
        <button class="ai-start-btn" onclick="openChat()">💬 开始对话</button>
        <br>
        <a class="coze-link" href="https://www.coze.cn/s/iqhvcTg_ZoU/" target="_blank">
          <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
          进入COZE官方智能体
        </a>
      </div>
      <div class="ai-loading" id="aiLoading">
        <span class="ai-loading-text">正在打开对话窗口</span>

  </div>
</div>

<script>
// ===== 题库数据 =====

// ===== 状态 =====
var courses=["综合布线系统","网络基础","网络设备配置","网络安全","服务器管理","编程基础","信息安全与法规"];
var diffs=["基础","中等","较难"];
var selCourse="综合布线系统",selDiff="中等";
var state={qs:[],idx:0,score:0,answered:0};

// ===== 初始化选择器 =====
function initSelectors(){
  var ch=document.getElementById("courseOpts");
  var dh=document.getElementById("diffOpts");
  courses.forEach(function(c,i){
    var d=document.createElement("div");
    d.className="sel-opt"+(i===0?" active":"");
    d.textContent=c;
    d.onclick=function(){selOpts("courseOpts",this);selCourse=c};
    ch.appendChild(d);
  });
  diffs.forEach(function(d,i){
    var el=document.createElement("div");
    el.className="sel-opt"+(i===1?" active":"");
    el.textContent=d;
    el.onclick=function(){selOpts("diffOpts",this);selDiff=d};
    dh.appendChild(el);
  });
}

function selOpts(gid,el){
  var g=document.getElementById(gid);
  g.querySelectorAll(".sel-opt").forEach(function(o){o.classList.remove("active")});
  el.classList.add("active");
}

// ===== 练习逻辑 =====
function startPractice(){
  var course=QBANK[selCourse];
  if(!course){return}
  var qs=course[selDiff];
  if(!qs||!qs.length){return}
  qs=qs.slice().sort(function(){return Math.random()-0.5}).slice(0,5);
  state={qs:qs,idx:0,score:0,answered:0};
  document.getElementById("selArea").style.display="none";
  document.getElementById("quizArea").style.display="block";
  showQuestion();
}

function showQuestion(){
  var q=state.qs[state.idx];
  var total=state.qs.length;
  var num=state.idx+1;
  document.getElementById("progressBar").style.width=(num/total*100)+"%";
  document.getElementById("qnum").textContent="第 "+num+" 题 / 共 "+total+" 题";
  document.getElementById("qtext").textContent=q.q;
  var labels=["A","B","C","D"];
  var oh="";
  for(var i=0;i<q.o.length;i++){
    oh+='<div class="qopt" onclick="answer(this,'+i+')"><span class="qopt-label">'+labels[i]+'</span><span class="qopt-text">'+q.o[i]+'</span></div>';
  }
  document.getElementById("qopts").innerHTML=oh;
  document.getElementById("feedback").className="feedback";
  document.getElementById("feedback").style.display="none";
  document.getElementById("qnav").style.display="none";
  updateScore();
}

function answer(el,idx){
  if(state.answered>state.idx)return;
  var q=state.qs[state.idx];
  var correct=q.a;
  var opts=document.querySelectorAll("#qopts .qopt");
  opts.forEach(function(o){o.classList.add("disabled")});
  opts[correct].classList.add("correct");
  if(idx!==correct)opts[idx].classList.add("wrong");
  else state.score+=20;
  state.answered=state.idx+1;
  var fb=document.getElementById("feedback");
  var labels=["A","B","C","D"];
  if(idx===correct){
    fb.className="feedback correct";
    fb.innerHTML="<b>✅ 回答正确！</b><br>"+q.e;
  }else{
    fb.className="feedback wrong";
    fb.innerHTML="<b>❌ 回答错误</b>，正确答案是 "+labels[correct]+"："+q.o[correct]+"<br>"+q.e;
  }
  fb.style.display="block";
  var nav=document.getElementById("qnav");
  nav.style.display="flex";
  if(state.idx>=state.qs.length-1){
    nav.innerHTML='<button class="qnav-btn" onclick="finish()">查看成绩 📊</button>';
  }else{
    nav.innerHTML='<button class="qnav-btn" onclick="nextQ()">下一题 →</button>';
  }
  updateScore();
}

function nextQ(){state.idx++;showQuestion()}

function finish(){
  var total=state.qs.length;
  var score=state.score;
  var pct=Math.round(score/(total*20)*100);
  var grade,gColor;
  if(pct>=80){grade="🎉 优秀！";gColor="#16a34a"}
  else if(pct>=60){grade="👍 良好";gColor="#2563eb"}
  else{grade="💪 继续加油";gColor="#ea580c"}
  document.getElementById("quizArea").innerHTML='<div class="result"><div class="result-score" style="color:'+gColor+'">'+score+'<span class="result-unit">分</span></div><div class="result-grade" style="color:'+gColor+'">'+grade+'</div><div class="result-info">共 '+total+' 题，满分 '+total*20+' 分，正确率 '+pct+'%</div><div class="result-btns"><button class="qnav-btn" onclick="resetPractice()">🔄 再练一次</button></div></div>';
  updateScore();
}

function resetPractice(){
  state={qs:[],idx:0,score:0,answered:0};
  document.getElementById("selArea").style.display="block";
  document.getElementById("quizArea").style.display="none";
  document.getElementById("quizArea").innerHTML='<div class="quiz-progress"><div class="quiz-progress-bar" id="progressBar"></div></div><div class="quiz-qnum" id="qnum"></div><div class="quiz-qtext" id="qtext"></div><div class="quiz-qopts" id="qopts"></div><div class="feedback" id="feedback"></div><div class="qnav" id="qnav"></div>';
  updateScore();
}

function updateScore(){
  document.getElementById("scoreDisplay").textContent="得分："+state.score;
}

// ===== AI助手 =====
function openChat(){
  var loading=document.getElementById("aiLoading");
  loading.classList.add("active");
  var w=window.open('https://www.coze.cn/s/iqhvcTg_ZoU/','coze_quiz_chat','width=480,height=720,scrollbars=yes,resizable=yes,menubar=no,toolbar=no,location=no,status=no');
  setTimeout(function(){loading.classList.remove("active")},1500);
  if(!w||w.closed||typeof w.closed==='undefined'){
    loading.classList.remove("active");
    window.open('https://www.coze.cn/s/iqhvcTg_ZoU/','_blank');
  }
}
