<html lang="zh-CN">
<head>

<title>题库练习AI助手 - 山东工业技师学院线上课堂</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f0f4f8;height:100vh;display:flex;flex-direction:column}
.topbar{background:linear-gradient(135deg,#744210,#c05621);color:#fff;padding:10px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar a{color:#fff;text-decoration:none;font-size:14px;padding:5px 12px;border:1px solid rgba(255,255,255,.3);border-radius:6px;transition:all .2s}
.topbar a:hover{background:rgba(255,255,255,.15)}
.topbar h1{font-size:17px;font-weight:600;flex:1}
.bot-tag{font-size:12px;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:12px}
.main{flex:1;display:flex;overflow:hidden}
/* 左侧题库 */
.quiz-side{flex:6;display:flex;flex-direction:column;background:#fff;border-right:1px solid #e2e8f0;overflow:hidden}
.quiz-header{padding:12px 20px;border-bottom:1px solid #e2e8f0;background:#fafafa;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.quiz-header h2{font-size:16px;color:#2d3748;margin-right:8px}
.qsel{padding:6px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;cursor:pointer;background:#fff}
.btn-rand{padding:6px 14px;background:linear-gradient(135deg,#48bb78,#38a169);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;transition:all .2s}
.btn-rand:hover{box-shadow:0 2px 6px rgba(72,187,120,.3)}
.btn-wrong{padding:6px 14px;background:#fff;color:#e53e3e;border:1px solid #fed7d7;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;transition:all .2s;position:relative}
.btn-wrong:hover{background:#fff5f5}
.btn-wrong .badge{position:absolute;top:-6px;right:-6px;background:#e53e3e;color:#fff;font-size:10px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center}
.quiz-body{flex:1;overflow-y:auto;padding:16px 20px}
.q-item{border:1px solid #e2e8f0;border-radius:12px;padding:16px;margin-bottom:14px;transition:all .2s}
.q-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.q-item.ai-gen{border-left:3px solid #dd6b20}
.q-num{font-size:12px;color:#a0aec0;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.q-num .ai-badge{background:#fefcbf;color:#c05621;font-size:11px;padding:1px 6px;border-radius:4px}
.q-text{font-size:15px;color:#2d3748;line-height:1.6;margin-bottom:10px;font-weight:500}
.q-opts label{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;margin-bottom:4px;border-radius:8px;cursor:pointer;transition:all .15s;font-size:14px;color:#4a5568}
.q-opts label:hover{background:#ebf4ff}
.q-opts input[type=radio]{margin-top:3px;accent-color:#c05621}
.q-ans{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.6;display:none}
.q-ans.correct{display:block;background:#f0fff4;border:1px solid #c6f6d5;color:#276749}
.q-ans.wrong{display:block;background:#fff5f5;border:1px solid #fed7d7;color:#9b2c2c}
.quiz-footer{padding:12px 20px;border-top:1px solid #e2e8f0;display:flex;align-items:center;gap:12px;background:#fafafa}
.quiz-footer button{padding:8px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600;transition:all .2s}
.btn-submit{background:linear-gradient(135deg,#c05621,#dd6b20);color:#fff}
.btn-submit:hover{box-shadow:0 2px 8px rgba(192,86,33,.3)}
.btn-next{background:#edf2f7;color:#4a5568}
.btn-next:hover{background:#e2e8f0}
.btn-clear{background:#fff;color:#e53e3e;border:1px solid #fed7d7;margin-left:auto}
.btn-clear:hover{background:#fff5f5}
.score-box{margin-left:auto;font-size:14px;color:#718096}
.empty-state{text-align:center;padding:50px 20px;color:#a0aec0}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:15px;line-height:1.6}
/* 右侧AI助手 */
.ai-side{flex:4;display:flex;flex-direction:column;background:#fffbf0;overflow:hidden;min-width:300px}
.ai-header{padding:10px 16px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:8px;background:#fefcbf}
.ai-header h3{font-size:15px;color:#744210;flex:1}
.ai-status{font-size:12px;color:#c05621}
.ai-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px}
.ai-msg{display:flex;gap:8px;max-width:92%;animation:fadeIn .3s ease}
.ai-msg.bot{align-self:flex-start}
.ai-msg.user{align-self:flex-end;flex-direction:row-reverse}
.ai-msg-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ai-msg.bot .ai-msg-avatar{background:linear-gradient(135deg,#c05621,#dd6b20);color:#fff}
.ai-msg.user .ai-msg-avatar{background:linear-gradient(135deg,#4299e1,#3182ce);color:#fff}
.ai-msg-bubble{padding:10px 14px;border-radius:14px;line-height:1.6;font-size:14px;word-break:break-word}
.ai-msg.bot .ai-msg-bubble{background:#fff;color:#2d3748;border-bottom-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.ai-msg.user .ai-msg-bubble{background:linear-gradient(135deg,#c05621,#dd6b20);color:#fff;border-bottom-right-radius:4px}
.ai-thinking-summary{display:none}
.msg-thinking-wrap{margin-bottom:8px;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;background:#f9fafb}
.msg-thinking-header{padding:8px 12px;cursor:pointer;font-size:13px;color:#6b7280;display:flex;align-items:center;gap:6px;user-select:none}
.msg-thinking-header:hover{background:#f3f4f6}
.msg-thinking-header .arrow{font-size:10px;transition:transform .2s}
.msg-thinking-wrap.expanded .msg-thinking-header .arrow{transform:rotate(180deg)}

.msg-thinking-wrap.expanded .msg-thinking-body{display:block}
.typing-cursor::after{content:'▊';animation:blink 1s infinite;color:#c05621}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ai-welcome{background:#fffbeb;border-radius:12px;padding:14px;text-align:center;margin-bottom:8px}
.ai-welcome p{color:#744210;font-size:13px;line-height:1.5}
.ai-quick{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:10px}
.ai-quick span{background:#fff;color:#c05621;padding:5px 12px;border-radius:16px;font-size:12px;cursor:pointer;border:1px solid #fbd38d;transition:all .15s;font-weight:500}
.ai-quick span:hover{background:#c05621;color:#fff}
.ai-quick span.green{color:#38a169;border-color:#c6f6d5}
.ai-quick span.green:hover{background:#38a169;color:#fff}
.add-quiz-btn{display:inline-block;margin-top:8px;padding:6px 14px;background:linear-gradient(135deg,#48bb78,#38a169);color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;transition:all .2s}
.add-quiz-btn:hover{box-shadow:0 2px 6px rgba(72,187,120,.3)}
.ai-input{padding:8px 10px;display:flex;gap:8px;border-top:1px solid #e2e8f0;background:#fefcbf}

.ai-input button{padding:8px 16px;background:linear-gradient(135deg,#c05621,#dd6b20);color:#fff;border:none;border-radius:20px;font-size:13px;cursor:pointer;font-weight:600}
.ai-input button:disabled{opacity:.5;cursor:not-allowed}
.ai-bottom{padding:6px 10px;text-align:center;border-top:1px solid #e2e8f0}
.coze-btn-sm{display:inline-flex;align-items:center;gap:4px;padding:6px 16px;background:linear-gradient(135deg,#c05621,#dd6b20);color:#fff;text-decoration:none;border-radius:20px;font-size:12px;font-weight:600}
/* 错题弹窗 */
.wrong-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.wrong-modal.show{display:flex}
/* 飞书同步弹窗 */
.feishu-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1100;display:none;align-items:center;justify-content:center}
.feishu-modal.show{display:flex}
.feishu-box{background:#fff;border-radius:16px;padding:28px 24px;width:90%;max-width:460px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}

.feishu-box .subtitle{color:#888;font-size:13px;margin-bottom:18px}
.feishu-label{font-size:13px;color:#555;margin:12px 0 4px;font-weight:600}
.feishu-select{width:100%;padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;background:#fff;color:#333}
.feishu-preview{background:#f7f8fa;border-radius:8px;padding:12px;font-size:12px;color:#666;white-space:pre-wrap;max-height:120px;overflow-y:auto;margin:14px 0}
.feishu-actions{display:flex;gap:10px;margin-top:18px}
.feishu-actions button{flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.feishu-cancel{background:#f1f5f9;color:#64748b}
.feishu-confirm{background:linear-gradient(135deg,#3370ff,#5b8def);color:#fff}

.feishu-success{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;z-index:1200;box-shadow:0 4px 20px rgba(16,185,129,.3);display:none}
.wrong-panel{background:#fff;border-radius:16px;width:90%;max-width:600px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.wrong-panel-header{padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center}
.wrong-panel-header h3{flex:1;font-size:16px;color:#e53e3e}
.wrong-panel-header button{background:none;border:none;font-size:20px;cursor:pointer;color:#a0aec0;padding:4px 8px}
.wrong-panel-body{flex:1;overflow-y:auto;padding:16px 20px}
.wrong-item{padding:12px;border:1px solid #fed7d7;border-radius:10px;margin-bottom:10px;background:#fff5f5}
.wrong-item .wrong-q{font-size:14px;font-weight:500;color:#2d3748;margin-bottom:6px}
.wrong-item .wrong-info{font-size:12px;color:#9b2c2c}
.wrong-empty{text-align:center;padding:40px;color:#a0aec0}
/* 飞书同步 */
.feishu-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;background:linear-gradient(135deg,#3370ff,#245bdb);color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;transition:all .2s;margin-top:6px}
.feishu-btn:hover{box-shadow:0 2px 8px rgba(51,112,255,.3);transform:translateY(-1px)}
.feishu-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.feishu-modal.show{display:flex}
.feishu-panel{background:#fff;border-radius:16px;width:90%;max-width:440px;box-shadow:0 10px 40px rgba(0,0,0,.2);animation:fadeIn .2s}
.feishu-panel h3{padding:18px 22px 0;font-size:16px;color:#1a202c}
.feishu-panel-body{padding:16px 22px}
.feishu-select-group{margin-bottom:14px}
.feishu-select-group label{display:block;font-size:13px;color:#4a5568;font-weight:600;margin-bottom:6px}
.feishu-select-group select{width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;color:#2d3748;outline:none;background:#f7fafc}
.feishu-select-group select:focus{border-color:#3370ff}
.feishu-preview{background:#f7fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;font-size:12px;color:#718096;max-height:120px;overflow-y:auto;white-space:pre-wrap;line-height:1.5;margin-bottom:14px}
.feishu-panel-footer{padding:12px 22px 18px;display:flex;gap:10px;justify-content:flex-end}
.feishu-panel-footer button{padding:8px 20px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;border:none}
.feishu-cancel{background:#edf2f7;color:#4a5568}
.feishu-cancel:hover{background:#e2e8f0}
.feishu-confirm{background:linear-gradient(135deg,#3370ff,#245bdb);color:#fff}
.feishu-confirm:hover{box-shadow:0 2px 6px rgba(51,112,255,.3)}
.feishu-success{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#48bb78;color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;z-index:300;display:none;animation:fadeIn .2s}
.feishu-wrong-btns{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid #fed7d7;justify-content:flex-end}
/* 响应式 */
@media(max-width:768px){
  .main{flex-direction:column}
  .quiz-side{flex:none;height:55vh;border-right:none;border-bottom:1px solid #e2e8f0}
  .ai-side{flex:1;min-width:auto}
}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">&larr; 返回首页</a>
  <h1>题库练习 + AI助手</h1>
  <span class="bot-tag">在线</span>
</div>
<div class="main">
  <!-- 左侧题库 -->
  <div class="quiz-side">
    <div class="quiz-header">
      <h2>智能题库</h2>
      <select class="qsel" id="courseSel" onchange="filterQs()"><option value="all">全部课程</option><option value="net">计算机网络基础</option><option value="route">路由与交换技术</option><option value="cab">综合布线技术</option><option value="sec">网络安全技术</option><option value="linux">Linux系统管理</option><option value="prog">程序设计基础</option><option value="server">Windows服务器配置</option></select>
      <select class="qsel" id="diffSel" onchange="filterQs()"><option value="all">全部难度</option><option value="easy">初级</option><option value="mid">中级</option><option value="hard">高级</option></select>
      <button class="btn-rand" onclick="randomGen()">🎲 随机出题</button>

      <span class="score-box" id="scoreBox"></span>

  </div>
  <!-- 右侧AI -->

function submitQuiz(){
  submitted=true;
  const end=Math.min(qIdx+BATCH,curQs.length);let right=0;
  for(let i=qIdx;i<end;i++){
    const num=i+1,q=curQs[i],sel=document.querySelector(`input[name="q${num}"]:checked`);
    const ansDiv=document.getElementById('ans'+num);
    if(!sel){ansDiv.className='q-ans wrong';ansDiv.textContent='⚠️ 未作答';continue}
    const v=parseInt(sel.value);
    if(v===q.a){
      right++;ansDiv.className='q-ans correct';ansDiv.textContent='✅ 正确！'+q.e;
    }else{
      ansDiv.className='q-ans wrong';ansDiv.textContent='❌ 错误。正确答案：'+String.fromCharCode(65+q.a)+'. '+q.o[q.a]+'。'+q.e;
      // 记录错题
      const exists=wrongList.find(w=>w.q===q.q);
      if(!exists){wrongList.push({q:q.q,o:q.o,a:q.a,e:e_ID=q.e,c:q.c,d:q.d,ts:Date.now()});localStorage.setItem('wrongList',JSON.stringify(wrongList));updateWrongBadge();}
    }
    ansDiv.style.display='block';
    document.querySelectorAll(`input[name="q${num}"]`).forEach(r=>r.disabled=true);
  }
  total+=end-qIdx;score+=right;
  document.getElementById('scoreBox').textContent=`得分: ${score}/${total}`;
  document.getElementById('submitBtn').style.display='none';
  document.getElementById('nextBtn').style.display=(qIdx+BATCH<curQs.length)?'':'none';
}

    document.getElementById('nextBtn').style.display='none';return;
  }
  document.getElementById('submitBtn').style.display='';document.getElementById('nextBtn').style.display='none';

/* 随机出题 - 从内置题库随机抽取 */
function randomGen(){
  const c=document.getElementById('courseSel').value,d=document.getElementById('diffSel').value;
  let pool=QBANK.filter(q=>(c==='all'||q.c===c)&&(d==='all'||q.d===d));
  if(!pool.length){alert('该条件下暂无内置题目，请让AI助手出题');return}
  pool.sort(()=>Math.random()-.5);
  const qs=pool.slice(0,Math.min(10,pool.length)).map(q=>({...q}));
  loadQsToPanel(qs);
}

function addAiQuestions(text){
  const questions=parseAiQuestions(text);
  if(!questions.length){alert('未能从AI回复中识别到可用的选择题，请让AI按标准格式输出');return}
  questions.forEach(q=>{q.aiGen=true;if(!q.c)q.c='net';if(!q.d)q.d='mid';});
  if(curQs.length===0||submitted){
    loadQsToPanel(questions);
  }else{
    curQs=curQs.concat(questions);
    document.getElementById('nextBtn').style.display=(qIdx+BATCH<curQs.length)?'':'none';
    // 刷新显示
    if(submitted)nextBatch();
  }
  // 滚动到左侧题库顶部
  document.getElementById('quizBody').scrollTop=0;
}

/* 解析AI输出的选择题 */
function parseAiQuestions(text){
  const qs=[];
  // 匹配模式：数字. 题干  A. 选项 B. 选项 C. 选项 D. 选项  答案：X
  const blocks=text.split(/\n(?=\d+[\.\、．])/);
  for(const block of blocks){
    const lines=block.trim().split('\n').filter(l=>l.trim());
    if(lines.length<3)continue;
    // 提取题干（第一行）
    let qText=lines[0].replace(/^\d+[\.\、．]\s*/,'').trim();
    // 提取选项
    const opts=[];
    const optRe=/^[A-Da-d][\.\、．、]\s*(.+)/;
    let answerIdx=-1;
    let explanation='';
    for(let i=1;i<lines.length;i++){
      const m=lines[i].match(optRe);
      if(m){opts.push(m[1].trim());continue}
      // 匹配答案
      const ansM=lines[i].match(/[答案|正确答案|Answer][:：]\s*([A-Da-d])/i);
      if(ansM){
        const letter=ansM[1].toUpperCase();
        answerIdx='ABCD'.indexOf(letter);
        continue;
      }
      // 匹配解析
      const expM=lines[i].match(/[解析|解释|Explanation][:：]\s*(.+)/i);
      if(expM)explanation=expM[1].trim();
    }
    if(qText&&opts.length>=2&&answerIdx>=0){
      qs.push({q:qText,o:opts,a:answerIdx,e:explanation||'暂无解析'});
    }
  }
  return qs;
}

function buildFeishuMessage(){

  feishuSyncData.forEach((w,i)=>{
    msg+=`\n${i+1}. ${w.q}\n`;
    if(w.opts)Object.entries(w.opts).forEach(([k,v])=>{msg+=`  ${k}. ${v}\n`});
    msg+=`  ⭕ 正确答案：${w.ans}\n`;

function toggleThinking(el){const w=el.parentElement;w.classList.toggle('expanded')}

function formatMsg(text){
  let html=escH(text);
  html=html.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  html=html.replace(/^### (.+)$/gm,'<div style="font-size:15px;font-weight:700;margin:8px 0 4px;color:#744210">$1</div>');
  html=html.replace(/^## (.+)$/gm,'<div style="font-size:16px;font-weight:700;margin:10px 0 4px;color:#744210">$1</div>');
  html=html.replace(/^[-*] (.+)$/gm,'<div style="padding-left:14px;margin:2px 0">• $1</div>');
  html=html.replace(/^(\d+)[\.\、．]\s*(.+)$/gm,'<div style="padding-left:14px;margin:2px 0">$1. $2</div>');
  return html;
}
</script>
