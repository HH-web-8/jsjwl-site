<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光纤熔接3D虚拟实训 - 山东工业技师学院</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--gold:#fbbf24;--txt:#e2e8f0;--txt2:#94a3b8;--txt3:#64748b;--radius:12px}
@font-face{font-family:'iconfont';src:unset}
body{font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;height:100vh;width:100vw}

/* === TOP BAR === */
.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(15,23,42,.95);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100;border-bottom:1px solid var(--bg3)}
.topbar-left{display:flex;align-items:center;gap:12px}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--txt2);cursor:pointer;padding:6px 14px;border-radius:8px;transition:all .2s;font-size:.9rem;border:1px solid var(--bg3)}
.back-btn:hover{color:var(--blue);border-color:var(--blue);background:rgba(59,130,246,.08)}
.topbar-title{font-size:1.1rem;font-weight:700;color:var(--txt);letter-spacing:1px}
.topbar-title span{color:var(--blue)}
.mode-toggle{display:flex;gap:4px;background:var(--bg2);border-radius:8px;padding:3px}
.mode-btn{padding:5px 14px;border-radius:6px;font-size:.82rem;cursor:pointer;transition:all .2s;color:var(--txt3);border:none;background:none}
.mode-btn.active{background:var(--blue);color:#fff}

/* === STEP INDICATOR === */
.step-bar{position:fixed;top:56px;left:0;right:0;height:52px;background:rgba(30,41,59,.9);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;gap:4px;z-index:99;border-bottom:1px solid rgba(51,65,85,.5)}
.step-item{display:flex;align-items:center;gap:4px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all .2s}
.step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;border:2px solid var(--bg3);color:var(--txt3);transition:all .3s}
.step-item.active .step-num{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 0 12px rgba(59,130,246,.4)}
.step-item.done .step-num{background:var(--green);border-color:var(--green);color:#fff}
.step-item.error .step-num{border-color:var(--red)}
.step-lbl{font-size:.72rem;color:var(--txt3);max-width:56px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.step-item.active .step-lbl{color:var(--blue)}
.step-item.done .step-lbl{color:var(--green)}
.step-connector{width:16px;height:2px;background:var(--bg3);border-radius:1px}
.step-connector.done{background:var(--green)}

/* === MAIN LAYOUT === */
.main{position:fixed;top:108px;left:0;right:0;bottom:0;display:flex}
/* Left: Video Panel */
.video-panel{width:30%;min-width:280px;background:var(--bg2);border-right:1px solid var(--bg3);display:flex;flex-direction:column;overflow:hidden}
.video-panel-head{padding:12px 16px;border-bottom:1px solid var(--bg3);font-size:.9rem;font-weight:700;color:var(--txt);display:flex;align-items:center;gap:8px}
.video-panel-head .icon{color:var(--cyan)}
.video-panel-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;background:var(--bg);position:relative;overflow:hidden}
.video-player{width:100%;aspect-ratio:16/9;background:#000;border-radius:var(--radius);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center}
.video-player video{width:100%;height:100%;object-fit:contain}
.video-info{padding:10px 14px;font-size:.78rem;color:var(--txt3);border-top:1px solid var(--bg3);line-height:1.5}
.video-info span{color:var(--cyan);font-weight:600}
/* Middle: 3D Scene */
.scene-wrap{flex:1;min-width:240px;max-width:480px;position:relative;overflow:hidden}
#three-canvas{width:100%;height:100%;display:block}
.scene-label{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(239,68,68,.85);color:#fff;font-size:.75rem;font-weight:700;padding:4px 14px;border-radius:12px;pointer-events:none;z-index:5;letter-spacing:.5px}

/* === RIGHT PANEL === */
.panel{width:35%;min-width:300px;max-width:460px;background:var(--bg2);border-left:1px solid var(--bg3);display:flex;flex-direction:column;overflow:hidden;transition:width .3s}
.panel.collapsed{width:48px}
.panel-toggle{display:none}
.panel-head{padding:16px 20px;border-bottom:1px solid var(--bg3)}
.panel-head h2{font-size:1.15rem;font-weight:700;color:var(--txt);display:flex;align-items:center;gap:8px}
.panel-head h2 .badge{font-size:.7rem;padding:2px 8px;border-radius:10px;background:var(--blue);color:#fff}
.panel-body{flex:1;overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}

/* === STEP CONTENT === */
.step-section{animation:fadeSlide .3s ease}
@keyframes fadeSlide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.instruction{color:var(--txt);line-height:1.8;font-size:.92rem;margin-bottom:16px}
.instruction b{color:var(--cyan)}
.tip-box{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:var(--radius);padding:14px 16px;margin:12px 0;font-size:.85rem;color:#93c5fd;line-height:1.6}
.tip-box.warn{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.2);color:#fcd34d}
.tip-box.danger{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.2);color:#fca5a5}
.tip-box.success{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.2);color:#6ee7b7}

/* === TOOL SHELF === */
.tool-shelf{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}
.tool-card{background:var(--bg);border:2px solid var(--bg3);border-radius:var(--radius);padding:12px 8px;cursor:pointer;transition:all .25s;text-align:center;position:relative}
.tool-card:hover{border-color:var(--txt3);transform:translateY(-2px)}
.tool-card.selected{border-color:var(--blue);background:rgba(59,130,246,.1);box-shadow:0 0 16px rgba(59,130,246,.2)}
.tool-card.correct{border-color:var(--green);background:rgba(16,185,129,.08)}
.tool-card.wrong{border-color:var(--red);background:rgba(239,68,68,.08);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.tool-icon{width:48px;height:48px;margin:0 auto 6px;display:block}
.tool-icon svg{width:100%;height:100%}
.tool-icon img{width:100%;height:100%;object-fit:contain;border-radius:4px}
.tool-name{font-size:.78rem;color:var(--txt2);font-weight:600;display:block}
.tool-info-btn{position:absolute;top:4px;right:6px;width:18px;height:18px;border-radius:50%;background:var(--bg3);color:var(--txt3);font-size:.65rem;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}
.tool-info-btn:hover{background:var(--blue);color:#fff}

/* === TOOL DETAIL POPUP === */
.tool-popup{position:fixed;z-index:200;background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:20px;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:fadeSlide .2s}
.tool-popup h3{color:var(--blue);font-size:1rem;margin-bottom:8px}
.tool-popup p{color:var(--txt2);font-size:.85rem;line-height:1.7;margin-bottom:6px}
.tool-popup .close-popup{position:absolute;top:8px;right:12px;color:var(--txt3);cursor:pointer;font-size:1.1rem}
.tool-popup .close-popup:hover{color:var(--red)}

/* === INTERACTIVE AREA === */
.interact-area{background:var(--bg);border:2px solid var(--bg3);border-radius:var(--radius);padding:20px;margin:12px 0;min-height:120px;position:relative;overflow:hidden}
.interact-area.highlight{border-color:var(--blue);box-shadow:0 0 20px rgba(59,130,246,.15)}
.fiber-visual{width:100%;height:60px;position:relative;margin:10px 0}
.fiber-core{position:absolute;top:50%;left:10%;right:10%;height:4px;background:linear-gradient(90deg,var(--gold),#fde68a,var(--gold));border-radius:2px;transform:translateY(-50%);transition:all .3s}
.fiber-coating{position:absolute;top:50%;left:10%;right:10%;height:14px;background:linear-gradient(90deg,#60a5fa,#93c5fd,#60a5fa);border-radius:7px;transform:translateY(-50%);transition:all .5s}
.fiber-coating.stripped{clip-path:inset(0 40% 0 0)}

/* Slider control */
.slider-group{margin:12px 0}
.slider-label{display:flex;justify-content:space-between;font-size:.82rem;color:var(--txt2);margin-bottom:6px}
.slider-label span{color:var(--cyan);font-weight:600}
input[type=range]{width:100%;height:6px;-webkit-appearance:none;background:var(--bg3);border-radius:3px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--blue);cursor:pointer;border:2px solid #fff}

/* Action buttons */
.action-row{display:flex;gap:10px;margin:14px 0;flex-wrap:wrap}
.act-btn{padding:10px 22px;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;border:2px solid;display:flex;align-items:center;gap:6px}
.act-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.act-btn.primary:hover{background:#2563eb;box-shadow:0 4px 16px rgba(59,130,246,.3)}
.act-btn.secondary{background:none;color:var(--txt2);border-color:var(--bg3)}
.act-btn.secondary:hover{border-color:var(--txt3);color:var(--txt)}
.act-btn.success{background:var(--green);color:#fff;border-color:var(--green)}
.act-btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
.act-btn:disabled{opacity:.4;cursor:not-allowed}

/* === FUSION MACHINE PANEL === */
.machine-panel{background:var(--bg);border:2px solid var(--bg3);border-radius:var(--radius);overflow:hidden;margin:12px 0}
.machine-screen{background:#0a1628;border-bottom:1px solid var(--bg3);padding:16px;text-align:center;min-height:140px;position:relative}
.machine-screen .screen-label{font-size:.7rem;color:var(--txt3);position:absolute;top:6px;left:10px}
.machine-screen canvas{max-width:100%;border-radius:4px}
.machine-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:12px}
.machine-btn{background:var(--bg2);border:1px solid var(--bg3);border-radius:8px;padding:10px 4px;cursor:pointer;transition:all .2s;text-align:center}
.machine-btn:hover{border-color:var(--blue);background:rgba(59,130,246,.1)}
.machine-btn:active{transform:scale(.95)}
.machine-btn.pressed{background:var(--blue);border-color:var(--blue);color:#fff}
.machine-btn .mbtn-icon{font-size:1.2rem;display:block;margin-bottom:2px}
.machine-btn .mbtn-lbl{font-size:.65rem;color:var(--txt3)}
.machine-btn.pressed .mbtn-lbl{color:#fff}

/* === FEEDBACK === */
.feedback{border-radius:var(--radius);padding:14px 16px;margin:12px 0;font-size:.88rem;line-height:1.6;animation:fadeSlide .3s}
.feedback.ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6ee7b7}
.feedback.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
.feedback.info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:#93c5fd}

/* === KNOWLEDGE CARD === */
.knowledge-card{background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(6,182,212,.08));border:1px solid rgba(59,130,246,.2);border-radius:var(--radius);padding:16px;margin:12px 0}
.knowledge-card h4{color:var(--cyan);font-size:.9rem;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.knowledge-card ul{list-style:none;padding:0}
.knowledge-card li{color:var(--txt2);font-size:.82rem;line-height:1.7;padding-left:16px;position:relative}
.knowledge-card li::before{content:'•';position:absolute;left:0;color:var(--cyan)}

/* === HEAT ANIMATION === */
.heat-container{margin:12px 0}
.heat-bar-wrap{height:20px;background:var(--bg3);border-radius:10px;overflow:hidden;position:relative}
.heat-bar-fill{height:100%;border-radius:10px;transition:width .1s linear;background:linear-gradient(90deg,#3b82f6,#f59e0b,#ef4444);width:0%}
.heat-bar-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}

/* === SCORE PAGE === */
.score-page{padding:24px;text-align:center}
.score-ring{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:140px;height:140px;border-radius:50%;border:4px solid;margin:16px 0}
.score-ring.excellent{border-color:var(--green);background:rgba(16,185,129,.08)}
.score-ring.good{border-color:var(--blue);background:rgba(59,130,246,.08)}
.score-ring.poor{border-color:var(--red);background:rgba(239,68,68,.08)}
.score-val{font-size:2.6rem;font-weight:900;line-height:1}
.score-lbl{font-size:.78rem;color:var(--txt3)}
.score-details{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0;text-align:left}
.score-item{background:var(--bg);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;font-size:.82rem}
.score-item .label{color:var(--txt3)}
.score-item .value{font-weight:700}
.score-item .value.pass{color:var(--green)}
.score-item .value.fail{color:var(--red)}

/* === PROGRESS OVERLAY === */
.progress-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(15,23,42,.7);z-index:50;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.progress-content{text-align:center}
.progress-spinner{width:48px;height:48px;border:3px solid var(--bg3);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-text{color:var(--txt2);font-size:.9rem}

/* === ARC EFFECT === */
.arc-effect{position:absolute;pointer-events:none;z-index:10}
.arc-glow{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.8),rgba(59,130,246,.3),transparent);animation:arcPulse .15s infinite alternate}
@keyframes arcPulse{from{opacity:.6;transform:scale(.9)}to{opacity:1;transform:scale(1.1)}}

/* === RESPONSIVE === */
@media(max-width:1100px){
  .video-panel{width:25%;min-width:220px}
  .panel{width:35%;min-width:260px;max-width:380px}
  .scene-wrap{max-width:400px}
}
@media(max-width:900px){
  .panel{max-width:360px}
  .tool-shelf{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:700px){
  .main{flex-direction:column}
  .video-panel{width:100%;height:auto;max-height:160px;border-right:none;border-bottom:1px solid var(--bg3)}
  .video-panel-body{padding:6px}
  .panel{width:100%;height:50%;border-left:none;border-top:1px solid var(--bg3);max-width:none}
  .scene-wrap{height:40%}
  .step-lbl{display:none}
}

/* === SPOTLIGHT === */
.spotlight{position:absolute;border:2px dashed var(--blue);border-radius:8px;pointer-events:none;animation:spotPulse 1.5s infinite;z-index:5}
@keyframes spotPulse{0%,100%{opacity:.4}50%{opacity:1}}

/* === Drag Sort === */
.drag-list{display:flex;flex-direction:column;gap:6px;margin:8px 0}
.drag-item{background:rgba(59,130,246,.12);border:2px solid rgba(59,130,246,.3);border-radius:8px;padding:10px 14px;cursor:grab;font-size:.85rem;color:#93c5fd;transition:all .2s;user-select:none}
.drag-item:active{cursor:grabbing;background:rgba(59,130,246,.2)}
.drag-item.correct{border-color:var(--green);color:#6ee7b7;background:rgba(16,185,129,.08)}
.drag-item.wrong{border-color:var(--red);color:#fca5a5;background:rgba(239,68,68,.08)}
.drag-slot{border:2px dashed var(--bg3);border-radius:8px;min-height:42px;padding:8px 14px;margin:4px 0;transition:all .2s;font-size:.82rem;color:var(--txt3)}
.drag-slot.filled{border-style:solid;border-color:var(--green)}
.drag-slot.drag-over{border-color:var(--blue);background:rgba(59,130,246,.05)}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="back-btn" onclick="location.href='index.html'">← 返回</div>
    <div class="topbar-title">⚡ <span>光纤熔接</span> 3D虚拟实训</div>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="mode-newbie" onclick="setMode('newbie')">新手引导</button>
    <button class="mode-btn" id="mode-exam" onclick="setMode('exam')">考核模式</button>
  </div>
</div>

<!-- STEP BAR -->
<div class="step-bar" id="stepBar"></div>

<!-- MAIN -->
<div class="main">
  <!-- LEFT: VIDEO PANEL -->
  <div class="video-panel" id="videoPanel">
    <div class="video-panel-head">
      <span class="icon">▶</span> 光纤熔接视频播放
    </div>
    <div class="video-panel-body">
      <div class="video-player" id="videoPlayer">
        <video id="videoEl" autoplay muted loop playsinline>
          <source src="光纤熔接视频1.mp4" type="video/mp4">
        </video>
      </div>
      <div class="video-controls" style="display:flex;gap:6px;margin-top:8px;justify-content:center">
        <button id="btnVideo1" onclick="switchVideo(1)" style="padding:4px 12px;border-radius:4px;border:1px solid var(--cyan);background:var(--cyan);color:#000;font-size:.75rem;cursor:pointer;font-weight:600">视频1</button>
        <button id="btnVideo2" onclick="switchVideo(2)" style="padding:4px 12px;border-radius:4px;border:1px solid var(--bg3);background:var(--bg2);color:var(--txt);font-size:.75rem;cursor:pointer">视频2</button>
      </div>
    </div>
    <div class="video-info">
      当前播放：<span id="videoStepName">光纤熔接实操教学1</span>
    </div>
  </div>

  <!-- MIDDLE: 3D SCENE -->
  <div class="scene-wrap" id="sceneWrap">
    <canvas id="three-canvas"></canvas>
    <div class="scene-label">3D光纤熔接平台</div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel" id="rightPanel">
    <div class="panel-head">
      <h2 id="panelTitle">步骤 1：工具与材料准备 <span class="badge">8步</span></h2>
    </div>
    <div class="panel-body" id="panelBody">
      <!-- Dynamic content injected by JS -->
    </div>
  </div>
</div>

<!-- TOOL POPUP (hidden) -->
<div class="tool-popup" id="toolPopup" style="display:none">
  <span class="close-popup" onclick="closeToolPopup()">✕</span>
  <h3 id="popupTitle"></h3>
  <p id="popupBody"></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ===========================
// STATE
// ===========================
var STEPS = [
  {id:1, name:'工具准备', short:'准备'},
  {id:2, name:'剥线去涂覆', short:'剥线'},
  {id:3, name:'光纤清洁', short:'清洁'},
  {id:4, name:'端面切割', short:'切割'},
  {id:5, name:'套热缩管', short:'热缩管'},
  {id:6, name:'熔接操作', short:'熔接'},
  {id:7, name:'加热保护', short:'加热'},
  {id:8, name:'质量检查', short:'检查'}
];

var state = {
  step: 0,
  mode: 'newbie',
  errors: 0,
  score: 100,
  stepScores: [],
  stepErrors: [],
  completed: [],
  stepData: {}
};

// ===========================
// STEP BAR
// ===========================
function renderStepBar(){
  var bar = document.getElementById('stepBar');
  var html = '';
  for(var i=0;i<STEPS.length;i++){
    var cls = '';
    if(i === state.step) cls = 'active';
    else if(state.completed.indexOf(i) >= 0) cls = 'done';
    html += '<div class="step-item '+cls+'" onclick="goStep('+i+')">';
    html += '<div class="step-num">'+(i+1)+'</div>';
    html += '<span class="step-lbl">'+STEPS[i].short+'</span>';
    html += '</div>';
    if(i < STEPS.length-1){
      var connCls = state.completed.indexOf(i) >= 0 ? ' done' : '';
      html += '<div class="step-connector'+connCls+'"></div>';
    }
  }
  bar.innerHTML = html;
}

/* Video switch */
function switchVideo(n){
  var v=document.getElementById('videoEl');
  var name=document.getElementById('videoStepName');
  var b1=document.getElementById('btnVideo1');
  var b2=document.getElementById('btnVideo2');
  v.src=n===1?'光纤熔接视频1.mp4':'光纤熔接视频2.mp4';
  v.load();v.play();
  name.textContent=n===1?'光纤熔接实操教学1':'光纤熔接实操教学2';
  b1.style.background=n===1?'var(--cyan)':'var(--bg2)';
  b1.style.color=n===1?'#000':'var(--txt)';
  b1.style.borderColor=n===1?'var(--cyan)':'var(--bg3)';

function updateStripLen(v){
  document.getElementById('stripLen').textContent = v+'mm';
  var pct = ((v-15)/35)*40;
  var coating = document.getElementById('fiberCoating');
  if(coating) coating.style.clipPath = 'inset(0 '+pct+'% 0 0)';
}
function updateStripForce(v){
  var labels = ['很轻','偏轻','适中','偏大','过大'];
  document.getElementById('stripForce').textContent = labels[v-1];
}

function executeStrip(){
  var len = parseInt(document.getElementById('stripRange').value);
  var force = parseInt(document.getElementById('forceRange').value);
  var fb = document.getElementById('step2-fb');
  var errors = 0;

  if(force >= 5){
    fb.innerHTML = '<div class="feedback err">❌ 力度过大！光纤已断裂，需要重新剥线。裸光纤非常脆弱，力度必须轻柔。</div>';
    errors++;
    state.errors++;
  } else if(force >= 4){
    fb.innerHTML = '<div class="feedback err">⚠️ 力度偏大，光纤出现微弯损伤，可能影响后续熔接质量。建议减小力度重试。</div>';
    errors++;
    state.errors++;
  } else if(len < 25){
    fb.innerHTML = '<div class="feedback err">⚠️ 剥线长度不足'+len+'mm，涂覆层残留会影响清洁和切割质量。标准长度30-40mm。</div>';
    errors++;
    state.errors++;
  } else if(len > 45){
    fb.innerHTML = '<div class="feedback info">ℹ️ 剥线长度'+len+'mm偏长，虽然可用但裸光纤暴露过长易受损。建议控制在30-40mm。</div>';
  } else {
    fb.innerHTML = '<div class="feedback ok">✅ 剥线操作正确！涂覆层已完整去除，裸光纤长度'+len+'mm，端面整齐。</div>';
  }

  if(errors === 0){
    state.stepData.stripLen = len;
    state.stepData.stripOk = true;
    setTimeout(function(){
      var addHtml = '<div class="knowledge-card"><h4>📚 知识点总结</h4><ul>';
      addHtml += '<li>光纤涂覆层直径250μm，使用红孔（250μm）钳口剥除</li>';
      addHtml += '<li>剥线长度标准：30-40mm，与切割刀适配</li>';
      addHtml += '<li>剥线时避免弯折光纤，保持直线拉出</li>';
      addHtml += '<li>剥线钳不可用于剥除光纤外护套或加强件</li>';
      addHtml += '</ul></div>';
      addHtml += '<div class="action-row" style="justify-content:center">';
      addHtml += '<button class="act-btn success" onclick="completeStep(1)">✓ 进入下一步</button>';
      addHtml += '</div>';
      fb.insertAdjacentHTML('afterend', addHtml);
    }, 600);
  }
}

function updateFiberPos(v){
  var fiberLine = document.getElementById('fiberLine');
  if(fiberLine) fiberLine.style.left = v+'%';
}

function executeCut(){
  var pos = parseInt(document.getElementById('fiberPos').value);
  var fb = document.getElementById('step4-fb');
  var blade = document.getElementById('bladeLine');

  // Animate blade
  if(blade){
    blade.style.height = '100%';
    setTimeout(function(){ blade.style.height = '0'; }, 500);
  }

  setTimeout(function(){
    var deviation = Math.abs(pos - 50);
    if(deviation > 30){
      fb.innerHTML = '<div class="feedback err">❌ 光纤放置位置严重偏移！切割角度过大，端面不合格。需重新切割。</div>';
      state.errors++;
    } else if(deviation > 15){
      fb.innerHTML = '<div class="feedback err">⚠️ 光纤位置有偏差，切割角度偏大。端面可能有倾斜，建议调整位置重试。</div>';
      state.errors++;
    } else {
      var angle = (deviation * 0.01).toFixed(2);
      fb.innerHTML = '<div class="feedback ok">✅ 切割完成！端面角度 '+angle+'°，质量良好。角度越小端面越平整。</div>';
      setTimeout(function(){
        var html = '<div class="knowledge-card"><h4>📚 知识点总结</h4><ul>';
        html += '<li>切割角度标准：<0.5°为优秀，<1°为合格</li>';
        html += '<li>光纤放置须对齐定位标尺，保持水平</li>';
        html += '<li>切割刀滑轨需定期清洁，刀片定期更换</li>';
        html += '<li>端面检查：无毛刺、无倾斜、无缺损</li>';
        html += '</ul></div>';
        html += '<div class="action-row" style="justify-content:center">';
        html += '<button class="act-btn success" onclick="completeStep(3)">✓ 进入下一步</button>';
        html += '</div>';
        fb.insertAdjacentHTML('afterend', html);
      },500);
    }
  },600);
}

function drawMachineScreen(status, text){
  var canvas = document.getElementById('machineCanvas');
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,340,100);
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(0,0,340,100);

  if(status === 'off'){
    ctx.fillStyle = '#1e293b';
    ctx.fillRect(0,0,340,100);
    ctx.fillStyle = '#334155';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('请按电源键开机', 170, 55);
  } else if(status === 'on'){
    ctx.fillStyle = '#0f2a1a';
    ctx.fillRect(0,0,340,100);
    ctx.strokeStyle = '#10b981';
    ctx.lineWidth = 1;
    ctx.strokeRect(10,10,320,80);
    ctx.fillStyle = '#10b981';
    ctx.font = '12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('FSM-70S READY', 20, 30);
    ctx.fillText('MODE: ' + (text || '---'), 20, 50);
    ctx.fillText('STATUS: WAITING', 20, 70);
  } else if(status === 'align'){
    ctx.fillStyle = '#0a1628';
    ctx.fillRect(0,0,340,100);
    // Draw fiber alignment view
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 1;
    ctx.strokeRect(10,10,320,80);
    // Left fiber
    ctx.fillStyle = '#fbbf24';
    ctx.fillRect(20, 45, 140, 3);
    ctx.fillStyle = '#60a5fa';
    ctx.fillRect(20, 40, 140, 2);
    // Right fiber
    ctx.fillStyle = '#fbbf24';
    ctx.fillRect(180, 45, 140, 3);
    ctx.fillStyle = '#60a5fa';
    ctx.fillRect(180, 40, 140, 2);
    // Electrodes
    ctx.fillStyle = '#64748b';
    ctx.fillRect(155, 25, 4, 15);
    ctx.fillRect(181, 25, 4, 15);
    ctx.fillStyle = '#94a3b8';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('电极', 170, 22);
  } else if(status === 'splicing'){
    ctx.fillStyle = '#0a1628';
    ctx.fillRect(0,0,340,100);
    ctx.strokeStyle = '#334155';
    ctx.strokeRect(10,10,320,80);
    // Arc effect
    var grd = ctx.createRadialGradient(170,48,2,170,48,20);
    grd.addColorStop(0,'rgba(59,130,246,0.8)');
    grd.addColorStop(0.5,'rgba(59,130,246,0.3)');
    grd.addColorStop(1,'rgba(59,130,246,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(150,28,40,40);
    // Fibers joined
    ctx.fillStyle = '#fbbf24';
    ctx.fillRect(20, 47, 300, 3);
    ctx.fillStyle = '#3b82f6';
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('DISCHARGING...', 170, 85);
  } else if(status === 'done'){
    ctx.fillStyle = '#0a1628';
    ctx.fillRect(0,0,340,100);
    ctx.strokeStyle = '#10b981';
    ctx.strokeRect(10,10,320,80);
    ctx.fillStyle = '#fbbf24';
    ctx.fillRect(20, 47, 300, 3);
    ctx.fillStyle = '#10b981';
    ctx.font = '12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SPLICE OK', 20, 30);
    ctx.fillText('LOSS: 0.02 dB', 20, 50);
    ctx.fillStyle = '#6ee7b7';
    ctx.fillText('ESTIMATE: GOOD', 20, 70);
  }
}

function pressMachineBtn(id){
  var d = state.stepData;

  // Visual feedback
  if(btnEl) btnEl.classList.add('pressed');

  switch(id){

      if(!d.machineOn){
        d.machineOn = true;
        drawMachineScreen('on', '---');
        fb.innerHTML = '<div class="feedback ok">✅ 熔接机已开机，系统自检中...</div>';
        statusEl.textContent = '开机完成 → 请设置熔接模式';
      }
      break;
    case 'mmode':
      if(!d.machineOn){
        fb.innerHTML = '<div class="feedback err">❌ 请先开机！</div>'; state.errors++;
      } else {
        d.modeSet = true;
        drawMachineScreen('on', 'SM(单模)');
        fb.innerHTML = '<div class="feedback ok">✅ 已设置熔接模式：SM单模光纤</div>';
        statusEl.textContent = '模式设置完成 → 请打开防风盖';
      }
      break;
    case 'mcover':
      if(!d.modeSet){
        fb.innerHTML = '<div class="feedback err">❌ 请先设置熔接模式！</div>'; state.errors++;
      } else if(!d.coverOpen){
        d.coverOpen = true;
        d.fiberPlaced = true;
        drawMachineScreen('align');
        fb.innerHTML = '<div class="feedback ok">✅ 防风盖已打开，左右光纤已放入V型槽，对准电极位置。请关闭防风盖。</div>';

            html += '</div>';
            fb.insertAdjacentHTML('afterend', html);
          }, 600);

      break;
    case 'mheat':
      fb.innerHTML = '<div class="feedback info">ℹ️ 加热功能在下一步（热缩管加热）中使用</div>';

function startHeating(){
  var btn = document.getElementById('heatBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 加热中...';
  var fill = document.getElementById('heatFill');
  var text = document.getElementById('heatText');
  var tube = document.getElementById('shrinkingTube');
  var fb = document.getElementById('step7-fb');
  fb.innerHTML = '<div class="feedback info">🔥 热缩管加热中，请等待...</div>';

  var progress = 0;
  var interval = setInterval(function(){
    progress += 1;
    fill.style.width = progress + '%';
    text.textContent = progress + '% / 加热时间约20秒';

    // Shrink tube animation
    if(tube && progress > 30){
      var shrinkProgress = Math.min(1, (progress - 30) / 60);
      var newHeight = 24 - shrinkProgress * 10;
      var newBorder = 2 - shrinkProgress * 1;
      tube.style.height = newHeight + 'px';
      tube.style.background = 'rgba(37,99,235,' + (0.1 + shrinkProgress * 0.2) + ')';
      tube.style.borderColor = shrinkProgress > 0.8 ? '#3b82f6' : '#f59e0b';
    }

    if(progress >= 100){
      clearInterval(interval);
      text.textContent = '加热完成！';
      fb.innerHTML = '<div class="feedback ok">✅ 热缩管加热完成！管体已完全收缩，紧密包裹熔接点。请取出并等待冷却。</div>';
      setTimeout(function(){
        var html = '<div class="knowledge-card"><h4>📚 知识点总结</h4><ul>';
        html += '<li>加热时间约20-30秒（60mm热缩管）</li>';
        html += '<li>加热完成后需等待冷却再取出</li>';
        html += '<li>热缩管应完全覆盖熔接点，两侧各15mm以上</li>';
        html += '<li>检查热缩管内有无气泡，有气泡需重新处理</li>';
        html += '</ul></div>';
        html += '<div class="action-row" style="justify-content:center">';
        html += '<button class="act-btn success" onclick="completeStep(6)">✓ 进入最后一步</button>';
        html += '</div>';
        fb.insertAdjacentHTML('afterend', html);
      },600);
    }
  }, 200);
}

  html += '<div id="step8-fb"></div>';
  html += '<div class="action-row" style="justify-content:center">';
  html += '<button class="act-btn primary" onclick="finishInspection()">📋 完成检查，生成报告</button>';
  html += '</div>';
  body.insertAdjacentHTML('beforeend', html);
  state.stepData.checks = {};
}

function toggleCheck(id){
  var el = document.getElementById(id);
  var box = el.querySelector('.chk-box');
  if(state.stepData.checks[id]){
    delete state.stepData.checks[id];
    box.style.background = 'transparent';
    box.innerHTML = '';
    el.style.borderColor = 'var(--bg3)';
  } else {
    state.stepData.checks[id] = true;
    box.style.background = 'var(--green)';
    box.style.borderColor = 'var(--green)';
    box.innerHTML = '✓';
    box.style.color = '#fff';
    box.style.fontSize = '.7rem';
  }
}

function finishInspection(){
  var checks = state.stepData.checks || {};
  var checked = Object.keys(checks).length;
  var fb = document.getElementById('step8-fb');

  if(checked < 3){
    fb.innerHTML = '<div class="feedback err">❌ 请至少完成3项检查后再提交！</div>';
    state.errors++;
    return;
  }

  // Calculate final score
  var baseScore = 100;
  var loss = state.stepData.spliceLoss || 0.02;
  var lossDeduct = loss > 0.1 ? 15 : (loss > 0.08 ? 8 : 0);
  var errorDeduct = state.errors * 5;
  var finalScore = Math.max(0, baseScore - lossDeduct - errorDeduct);
  var grade = finalScore >= 90 ? '优秀' : (finalScore >= 75 ? '良好' : (finalScore >= 60 ? '合格' : '不合格'));
  var gradeColor = finalScore >= 90 ? 'var(--green)' : (finalScore >= 75 ? 'var(--blue)' : (finalScore >= 60 ? 'var(--amber)' : 'var(--red)'));

  state.score = finalScore;
  state.stepScores[7] = finalScore;
  state.completed.push(7);

  fb.innerHTML = '<div class="feedback ok">✅ 质量检查完成！</div>';

  // Show score page
  var body = document.getElementById('panelBody');
  body.innerHTML = '<div class="score-page">';
  body.innerHTML += '<div style="font-size:1.2rem;font-weight:700;margin-bottom:8px;color:var(--txt)">实训完成！</div>';
  body.innerHTML += '<div class="score-ring '+(finalScore>=90?'excellent':(finalScore>=60?'good':'poor'))+'">';
  body.innerHTML += '<div class="score-val" style="color:'+gradeColor+'">'+finalScore+'</div>';
  body.innerHTML += '<div class="score-lbl">分</div>';
  body.innerHTML += '</div>';
  body.innerHTML += '<div style="font-size:1.1rem;font-weight:700;color:'+gradeColor+';margin-bottom:16px">'+grade+'</div>';

  body.innerHTML += '<div class="score-details">';
  body.innerHTML += '<div class="score-item"><span class="label">熔接损耗</span><span class="value '+(loss<=0.08?'pass':'fail')+'">'+loss.toFixed(2)+' dB</span></div>';
  body.innerHTML += '<div class="score-item"><span class="label">操作错误</span><span class="value '+(state.errors===0?'pass':'fail')+'">'+state.errors+' 次</span></div>';
  body.innerHTML += '<div class="score-item"><span class="label">步骤完成</span><span class="value pass">'+state.completed.length+'/'+STEPS.length+'</span></div>';
  body.innerHTML += '<div class="score-item"><span class="label">检查项</span><span class="value pass">'+checked+'/4</span></div>';
  body.innerHTML += '</div>';

  body.innerHTML += '<div class="knowledge-card"><h4>📋 实训总结</h4><ul>';
  if(loss <= 0.05) body.innerHTML += '<li>熔接损耗优秀，操作规范</li>';
  else if(loss <= 0.08) body.innerHTML += '<li>熔接损耗良好，仍有优化空间</li>';
  else body.innerHTML += '<li>熔接损耗偏高，需注意清洁和切割质量</li>';
  if(state.errors === 0) body.innerHTML += '<li>操作零失误，非常出色！</li>';
  else body.innerHTML += '<li>共'+state.errors+'次操作失误，需加强练习</li>';
  body.innerHTML += '<li>完整掌握光纤熔接8步操作流程</li>';
  body.innerHTML += '</ul></div>';

  body.innerHTML += '<div class="action-row" style="justify-content:center">';
  body.innerHTML += '<button class="act-btn primary" onclick="restartTraining()">🔄 重新训练</button>';
  body.innerHTML += '<button class="act-btn secondary" onclick="location.href=\'index.html\'">🏠 返回首页</button>';
  body.innerHTML += '</div>';
  body.innerHTML += '</div>';

  renderStepBar();
}

function restartTraining(){
  state = {step:0,mode:state.mode,errors:0,score:100,stepScores:[],stepErrors:[],completed:[],stepData:{}};
  renderStepBar();
  renderPanel();
  updateScene();
}

function completeStep(idx){
  state.completed.push(idx);
  state.step = idx + 1;
  renderStepBar();
  renderPanel();
  updateScene();
}

var scene, camera, renderer, sceneObjects = {};

function initThreeJS(){
  var canvas = document.getElementById('three-canvas');
  var wrap = document.getElementById('sceneWrap');

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0f172a);
  scene.fog = new THREE.Fog(0x0f172a, 8, 20);

  camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.1, 100);
  camera.position.set(0, 3, 6);
  camera.lookAt(0, 0.5, 0);

  renderer = new THREE.WebGLRenderer({canvas: canvas, antialias: true});
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  // Lighting
  var ambientLight = new THREE.AmbientLight(0x404060, 0.6);
  scene.add(ambientLight);

  var dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(3, 5, 4);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 1024;
  dirLight.shadow.mapSize.height = 1024;
  scene.add(dirLight);

  var pointLight = new THREE.PointLight(0x3b82f6, 0.4, 10);
  pointLight.position.set(-2, 3, 2);
  scene.add(pointLight);

  // Ground / Desk
  var deskGeo = new THREE.BoxGeometry(6, 0.15, 3);
  var deskMat = new THREE.MeshStandardMaterial({color: 0x2d3748, roughness: 0.7});
  var desk = new THREE.Mesh(deskGeo, deskMat);
  desk.position.y = -0.075;
  desk.receiveShadow = true;
  scene.add(desk);
  sceneObjects.desk = desk;

  // Grid on desk
  var gridHelper = new THREE.GridHelper(6, 12, 0x334155, 0x1e293b);
  gridHelper.position.y = 0.01;
  scene.add(gridHelper);

  // Build equipment models
  buildFusionSplicer();
  buildCleaver();
  buildStripper();
  buildFiber();
  buildHeatShrink();
  buildFiberCables();

  // Mouse interaction for rotation
  var isDragging = false;
  var prevMouse = {x: 0, y: 0};
  var rotTarget = {x: 0, y: 0};

  canvas.addEventListener('mousedown', function(e){
    isDragging = true;
    prevMouse = {x: e.clientX, y: e.clientY};
  });
  canvas.addEventListener('mousemove', function(e){
    if(!isDragging) return;
    var dx = e.clientX - prevMouse.x;
    var dy = e.clientY - prevMouse.y;
    rotTarget.y += dx * 0.005;
    rotTarget.x += dy * 0.005;
    rotTarget.x = Math.max(-1, Math.min(1, rotTarget.x));
    prevMouse = {x: e.clientX, y: e.clientY};
  });
  canvas.addEventListener('mouseup', function(){ isDragging = false; });
  canvas.addEventListener('mouseleave', function(){ isDragging = false; });
  canvas.addEventListener('wheel', function(e){
    camera.position.z += e.deltaY * 0.005;
    camera.position.z = Math.max(3, Math.min(10, camera.position.z));
  });

  // Animate
  function animate(){
    requestAnimationFrame(animate);
    // Smooth camera rotation
    var targetX = 3 * Math.cos(rotTarget.y) * Math.sin(Math.PI/4 - rotTarget.x);
    var targetY = 3 * Math.sin(Math.PI/4 - rotTarget.x);
    var targetZ = 3 * Math.sin(rotTarget.y) * Math.sin(Math.PI/4 - rotTarget.x);
    camera.position.x += (targetX - camera.position.x + 0) * 0.05;
    camera.position.y += (targetY - camera.position.y + 0.5) * 0.05;
    camera.position.z += (targetZ - camera.position.z + 6) * 0.05;
    camera.lookAt(0, 0.5, 0);
    renderer.render(scene, camera);
  }
  animate();

  // Resize
  window.addEventListener('resize', function(){
    camera.aspect = wrap.clientWidth / wrap.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  });
}

function updateScene(){
  var step = state.step;
  // Reset visibility
  if(sceneObjects.splicer) sceneObjects.splicer.visible = true;
  if(sceneObjects.cleaver) sceneObjects.cleaver.visible = true;
  if(sceneObjects.stripper) sceneObjects.stripper.visible = true;
  if(sceneObjects.fiber) sceneObjects.fiber.visible = true;
  if(sceneObjects.heatShrink) sceneObjects.heatShrink.visible = false;
  if(sceneObjects.fiberSpool) sceneObjects.fiberSpool.visible = true;
  if(sceneObjects.cable1) sceneObjects.cable1.visible = true;
  if(sceneObjects.cable2) sceneObjects.cable2.visible = true;
  if(sceneObjects.alcoholBottle) sceneObjects.alcoholBottle.visible = true;
  if(sceneObjects.tissue) sceneObjects.tissue.visible = true;

  // Highlight current step equipment
  if(sceneObjects.splicer){
    sceneObjects.splicer.position.y = 0.08;
    sceneObjects.splicer.children.forEach(function(c){
      if(c.material && c.material.emissive) c.material.emissive.setHex(0x000000);
    });
  }

  switch(step){
    case 0: // Tool prep - show all
      break;
    case 1: // Stripping - highlight stripper
      if(sceneObjects.stripper){
        sceneObjects.stripper.position.y = 0.15;
      }
      break;
    case 2: // Cleaning - fiber prominent
      if(sceneObjects.fiber) sceneObjects.fiber.position.y = 0.25;
      break;
    case 3: // Cutting - highlight cleaver
      if(sceneObjects.cleaver) sceneObjects.cleaver.position.y = 0.18;
      break;
    case 4: // Heat shrink tube
      if(sceneObjects.heatShrink) {
        sceneObjects.heatShrink.visible = true;
        sceneObjects.heatShrink.position.y = 0.15;
      }
      break;
    case 5: // Splicing - highlight machine
      if(sceneObjects.splicer){
        sceneObjects.splicer.position.y = 0.1;
        if(sceneObjects.screen){
          sceneObjects.screen.material.emissive.setHex(0x10b981);
          sceneObjects.screen.material.emissiveIntensity = 0.3;
        }
      }
      break;
    case 6: // Heating
      if(sceneObjects.heatShrink){
        sceneObjects.heatShrink.visible = true;
        sceneObjects.heatShrink.position.y = 0.3;
      }
      break;
    case 7: // Inspection
      break;
  }
}

window.addEventListener('DOMContentLoaded', function(){
  renderStepBar();
  renderPanel();
  initThreeJS();
  updateScene();
});
