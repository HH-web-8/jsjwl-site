<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>学生AI答疑助手 - 山东工业技师学院线上课堂</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f0fdf4;height:100vh;display:flex;flex-direction:column}
.topbar{background:linear-gradient(135deg,#1a4731,#276749);color:#fff;padding:12px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar a{color:#fff;text-decoration:none;font-size:14px;padding:6px 14px;border:1px solid rgba(255,255,255,.3);border-radius:6px;transition:all .2s}
.topbar a:hover{background:rgba(255,255,255,.15)}
.topbar h1{font-size:18px;font-weight:600;flex:1}
.bot-tag{font-size:12px;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:12px}
.chat-wrap{flex:1;display:flex;flex-direction:column;max-width:900px;width:100%;margin:0 auto;padding:16px;overflow:hidden}
.msgs{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:10px;max-width:85%;animation:fadeIn .3s ease}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.msg.bot .msg-avatar{background:linear-gradient(135deg,#276749,#48bb78)}
.msg.user .msg-avatar{background:linear-gradient(135deg,#4299e1,#3182ce)}
.msg-bubble{padding:12px 16px;border-radius:16px;line-height:1.7;font-size:15px;word-break:break-word;position:relative}
.msg.bot .msg-bubble{background:#fff;color:#2d3748;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.msg.user .msg-bubble{background:linear-gradient(135deg,#276749,#48bb78);color:#fff;border-bottom-right-radius:4px}
.msg-thinking-wrap{margin-bottom:8px;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.msg-thinking-header{display:flex;align-items:center;gap:6px;padding:8px 12px;cursor:pointer;background:#f7fafc;user-select:none;font-size:13px;color:#718096}
.msg-thinking-header:hover{background:#edf2f7}
.msg-thinking-header .arrow{transition:transform .2s;display:inline-block}
.msg-thinking-header .arrow.collapsed{transform:rotate(-90deg)}
.msg-thinking-body{padding:8px 12px;color:#a0aec0;font-size:13px;font-style:italic;max-height:300px;overflow-y:auto;white-space:pre-wrap;line-height:1.5}
.msg-thinking-wrap.collapsed .msg-thinking-body{display:none}
.msg-thinking-wrap.expanded .msg-thinking-body{display:block}
.typing-cursor::after{content:'▊';animation:blink 1s infinite;color:#48bb78}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.welcome{background:linear-gradient(135deg,#f0fff4,#e6fffa);border-radius:16px;padding:24px;margin-bottom:12px;text-align:center}
.welcome h2{color:#1a4731;font-size:20px;margin-bottom:8px}
.welcome p{color:#4a5568;font-size:14px;line-height:1.6;margin-bottom:12px}
.welcome-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.welcome-tag{background:#fff;color:#276749;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .2s;border:1px solid #c6f6d5}
.welcome-tag:hover{background:#276749;color:#fff}
.input-area{padding:12px 0;display:flex;gap:10px;flex-shrink:0}
.input-area input{flex:1;padding:12px 18px;border:2px solid #c6f6d5;border-radius:24px;font-size:15px;outline:none;transition:border-color .2s}
.input-area input:focus{border-color:#48bb78}
.input-area button{padding:12px 24px;background:linear-gradient(135deg,#276749,#48bb78);color:#fff;border:none;border-radius:24px;font-size:15px;cursor:pointer;transition:all .2s;font-weight:600}
.input-area button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(39,103,73,.3)}
.input-area button:disabled{opacity:.5;cursor:not-allowed;transform:none}
.bottom-bar{padding:10px 16px;text-align:center;flex-shrink:0}
.coze-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;background:linear-gradient(135deg,#276749,#48bb78);color:#fff;text-decoration:none;border-radius:24px;font-size:14px;font-weight:600;transition:all .2s;box-shadow:0 2px 8px rgba(39,103,73,.2)}
.coze-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(39,103,73,.35)}
@media(max-width:640px){
  .topbar{padding:10px 16px}
  .topbar h1{font-size:15px}
  .chat-wrap{padding:10px}
  .msg{max-width:92%}
  .welcome h2{font-size:17px}
  }
  .msg-thinking-wrap{margin:4px 0 8px;border-left:3px solid #2E7D32;padding:6px 10px;background:rgba(46,125,50,0.06);border-radius:0 8px 8px 0}
  .msg-thinking-header{font-size:12px;color:#2E7D32;cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px}
  .msg-thinking-header .arrow{font-size:10px}
  .msg-thinking-body{margin-top:6px;font-size:13px;color:#555;line-height:1.6;white-space:pre-wrap;max-height:0;overflow:hidden;transition:max-height .3s}
  .msg-thinking-wrap.expanded .msg-thinking-body{max-height:2000px}
  .msg-thinking-wrap:not(.expanded) .msg-thinking-body{max-height:0}
  .sync-feishu-btn{display:inline-block;margin-top:8px;padding:4px 12px;border:1px solid #48bb78;border-radius:16px;background:#f0fff4;color:#276749;font-size:12px;cursor:pointer;transition:all .2s}
  .sync-feishu-btn:hover{background:#c6f6d5}
  .feishu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
  .feishu-overlay.show{display:flex}
  .feishu-modal{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:420px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .feishu-modal h3{margin:0 0 16px;font-size:18px;color:#1a4731}
  .feishu-modal label{display:block;font-size:13px;color:#555;margin:12px 0 4px;font-weight:600}
  .feishu-modal select,.feishu-modal textarea{width:100%;padding:8px 12px;border:1px solid #c6f6d5;border-radius:8px;font-size:13px;box-sizing:border-box}
  .feishu-modal textarea{min-height:60px;resize:vertical}
  .feishu-btns{display:flex;gap:10px;margin-top:18px}
  .feishu-btns button{flex:1;padding:10px;border-radius:8px;font-size:14px;cursor:pointer;border:none}
  .feishu-btns .btn-cancel{background:#edf2f7;color:#4a5568}
  .feishu-btns .btn-confirm{background:#48bb78;color:#fff}
  .feishu-btns .btn-confirm:hover{background:#38a169}
  .sync-toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#276749;color:#fff;padding:12px 24px;border-radius:8px;font-size:14px;z-index:1001;box-shadow:0 4px 12px rgba(0,0,0,.2)}
  .sync-toast.show{display:block}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">&larr; 返回首页</a>
  <h1>学生AI答疑助手</h1>
  <span class="bot-tag">在线</span>
</div>
<div class="chat-wrap">
  <div class="msgs" id="msgs">
    <div class="welcome">
      <h2>计算机网络应用专业学生答疑小助手</h2>
      <p>遇到专业问题随时提问，涵盖网络设备配置、综合布线、网络安全等17门课程知识点</p>
      <div class="welcome-tags">
        <span class="welcome-tag" onclick="sendQuick('OSI七层模型每层的功能是什么？')">OSI七层模型</span>
        <span class="welcome-tag" onclick="sendQuick('子网掩码255.255.255.0怎么计算可用主机数？')">子网掩码计算</span>
        <span class="welcome-tag" onclick="sendQuick('双绞线T568B线序是什么？')">T568B线序</span>
      </div>
    </div>
  </div>
  <div class="input-area">
    <input id="input" type="text" placeholder="输入你的专业问题..." onkeydown="if(event.key==='Enter')send()">
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
  <div class="bottom-bar">
    <a class="coze-btn" href="https://www.coze.cn/s/jgZXDhiIMho/" target="_blank">进入COZE官方智能体 &rarr;</a>
  </div>
</div>
<script>
const BOT_ID='7645540020057374756';
const API_URL='https://api.coze.cn/v3/chat';
const TOKEN='sat_5fSxGjaYFMpx9nSlIhXwt9mCAxKUKtJbaEwfyCIW9lSewRnHKSa4Qs5QEg5Zr0RZ';
let userId='u_'+Math.random().toString(36).substr(2,8);
let conversationId=null;
let isStreaming=false;
let msgIdCounter=0;

function addMsg(role,html){
  const d=document.createElement('div');
  d.className='msg '+role;
  d.innerHTML=`<div class="msg-avatar">${role==='bot'?'🤖':'👤'}</div><div class="msg-bubble">${html}</div>`;
  document.getElementById('msgs').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
  return d;
}

function scrollBottom(){const m=document.getElementById('msgs');m.scrollTop=m.scrollHeight;}

async function send(){
  const input=document.getElementById('input');
  const text=input.value.trim();
  if(!text||isStreaming)return;
  input.value='';
  isStreaming=true;
  document.getElementById('sendBtn').disabled=true;
  addMsg('user',escHtml(text));
  const botDiv=addMsg('bot','<span class="typing-cursor">思考中...</span>');
  const bubble=botDiv.querySelector('.msg-bubble');
  let answerText='';
  let thinkingText='';
  let hasAnswer=false;

  try{
    const body={bot_id:BOT_ID,user_id:userId,stream:true,auto_save_history:true,additional_messages:[{role:'user',content:text,content_type:'text'}]};
    if(conversationId)body.conversation_id=conversationId;
    const resp=await fetch(API_URL,{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify(body)});
    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let buf='';

    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      buf+=decoder.decode(value,{stream:true});
      const lines=buf.split('\n');
      buf=lines.pop();

      let currentEvent='';
      for(const line of lines){
        if(line.startsWith('event:')){currentEvent=line.slice(6).trim();continue;}
        if(!line.startsWith('data:'))continue;
        const data=line.slice(5).trim();
        if(!data||data==='[DONE]')continue;
        try{
          const obj=JSON.parse(data);
          if(obj.conversation_id&&!conversationId)conversationId=obj.conversation_id;
          if(currentEvent==='conversation.message.delta'){
            if(obj.type==='answer'){hasAnswer=true;if(obj.content)answerText+=obj.content;}
            else if(obj.type==='verbose'&&obj.content){thinkingText+=obj.content;}
          }
          if(currentEvent==='conversation.message.completed'){
            if(obj.type==='answer'&&obj.content){answerText=obj.content;hasAnswer=true;}
          }
          let html='';
          const curMsgId='st_'+(msgIdCounter++);
          if(thinkingText)html+=`<div class="msg-thinking-wrap expanded" id="${curMsgId}"><div class="msg-thinking-header" onclick="toggleThinking('${curMsgId}')"><span class="arrow">▼</span>💭 思考中...</div><div class="msg-thinking-body">${escHtml(thinkingText)}</div></div>`;
          if(answerText)html+=formatMsg(answerText);
          else if(!hasAnswer&&!thinkingText)html+='<span class="typing-cursor">思考中...</span>';
          bubble.innerHTML=html;
          scrollBottom();
        }catch(e){}
      }
    }
    const fMsgId='stf_'+(msgIdCounter++);
    let finalHtml='';
    if(thinkingText)finalHtml+=`<div class="msg-thinking-wrap" id="${fMsgId}"><div class="msg-thinking-header" onclick="toggleThinking('${fMsgId}')"><span class="arrow">▶</span>💭 思考完成</div><div class="msg-thinking-body">${escHtml(thinkingText)}</div></div>`;
    finalHtml+=answerText?formatMsg(answerText):'抱歉，未获取到回复，请重试。';
    if(answerText)finalHtml+=`<button class="sync-feishu-btn" onclick="openFeishuModal(this)">📤 同步到飞书</button>`;
    bubble.innerHTML=finalHtml;
    scrollBottom();
  }catch(e){
    bubble.innerHTML='⚠️ 网络错误，请稍后重试。也可<a href="https://www.coze.cn/s/jgZXDhiIMho/" target="_blank" style="color:#48bb78">点击进入COZE官方智能体</a>';
    console.error(e);
  }
  isStreaming=false;
  document.getElementById('sendBtn').disabled=false;
  input.focus();
}

function sendQuick(text){document.getElementById('input').value=text;send();}

function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML.replace(/\n/g,'<br>');}

function formatMsg(text){
  let html=escHtml(text);
  html=html.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  html=html.replace(/^### (.+)$/gm,'<div style="font-size:16px;font-weight:700;margin:8px 0 4px;color:#1a4731">$1</div>');
  html=html.replace(/^## (.+)$/gm,'<div style="font-size:17px;font-weight:700;margin:10px 0 4px;color:#1a4731">$1</div>');
  html=html.replace(/^[-*] (.+)$/gm,'<div style="padding-left:16px;margin:2px 0">• $1</div>');
  html=html.replace(/^(\d+)\. (.+)$/gm,'<div style="padding-left:16px;margin:2px 0">$1. $2</div>');
  return html;
}
function toggleThinking(id){
  const el=document.getElementById(id);
  if(el){el.classList.toggle('expanded');const arrow=el.querySelector('.arrow');if(arrow)arrow.textContent=el.classList.contains('expanded')?'▼':'▶';}
}
const COURSE_MAP={cable:'综合布线系统',net:'网络基础',route:'路由交换技术',security:'网络安全',server:'服务器配置',wireless:'无线网络',program:'网络编程'};
const REASON_TYPES=['概念理解错误','计算错误','配置步骤遗漏','协议理解偏差','实操流程不熟','其他'];
let feishuContent='';

function openFeishuModal(btn){
  const bubble=btn.closest('.msg-bubble');
  feishuContent=bubble.querySelector('.msg-text')?bubble.querySelector('.msg-text').textContent:btn.previousSibling.textContent||'';
  const s=document.getElementById('feishuOverlay');
  s.classList.add('show');
  document.getElementById('fsReason').value=REASON_TYPES[0];
  document.getElementById('fsNote').value='';
}
function closeFeishu(){document.getElementById('feishuOverlay').classList.remove('show');}

function doSyncFeishu(){
  const reason=document.getElementById('fsReason').value;
  const course=document.getElementById('fsCourse').value;
  const note=document.getElementById('fsNote').value.trim();
  const courseName=COURSE_MAP[course]||course;
  const now=new Date().toLocaleString('zh-CN');
  const msg=`【咨询记录同步】\n时间：${now}\n来源：学生AI答疑助手\n课程：${courseName}\n问题类型：${reason}\n咨询内容：\n${feishuContent.slice(0,800)}${note?'\n补充说明：'+note:''}\n\n请将此记录写入飞书多维表格。`;
  navigator.clipboard.writeText(msg).then(()=>{
    closeFeishu();
    const t=document.getElementById('syncToast');t.classList.add('show');
    setTimeout(()=>{t.classList.remove('show');window.open('https://www.coze.cn/s/jgZXDhiIMho/','_blank');},1500);
  }).catch(()=>{closeFeishu();alert('复制失败，请手动复制');});
}
</script>

<div class="feishu-overlay" id="feishuOverlay">
  <div class="feishu-modal">
    <h3>📤 同步咨询记录到飞书</h3>
    <label>问题分类</label>
    <select id="fsReason"><option>概念理解错误</option><option>计算错误</option><option>配置步骤遗漏</option><option>协议理解偏差</option><option>实操流程不熟</option><option>其他</option></select>
    <label>课程</label>
    <select id="fsCourse"><option value="cable">综合布线系统</option><option value="net">网络基础</option><option value="route">路由交换技术</option><option value="security">网络安全</option><option value="server">服务器配置</option><option value="wireless">无线网络</option><option value="program">网络编程</option></select>
    <label>补充说明（可选）</label>
    <textarea id="fsNote" placeholder="补充说明..."></textarea>
    <div class="feishu-btns">
      <button class="btn-cancel" onclick="closeFeishu()">取消</button>
      <button class="btn-confirm" onclick="doSyncFeishu()">确认同步</button>
    </div>
  </div>
</div>
<div class="sync-toast" id="syncToast">✅ 已复制到剪贴板，即将打开飞书Bot窗口...</div>

</body>
</html>
