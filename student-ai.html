<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>学生AI答疑助手 - 山东工业技师学院线上课堂</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f0fdf4;height:100vh;display:flex;flex-direction:column}
.topbar{background:linear-gradient(135deg,#1a4731,#276749);color:#fff;padding:12px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar a{color:#fff;text-decoration:none;font-size:14px;padding:6px 14px;border:1px solid rgba(255,255,255,.3);border-radius:6px;transition:all .2s}
.topbar a:hover{background:rgba(255,255,255,.15)}
.topbar h1{font-size:18px;font-weight:600;flex:1}
.bot-tag{font-size:12px;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:12px}
.chat-wrap{flex:1;display:flex;flex-direction:column;max-width:900px;width:100%;margin:0 auto;padding:16px;overflow:hidden}
.msgs{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:10px;max-width:85%;animation:fadeIn .3s ease}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.msg.bot .msg-avatar{background:linear-gradient(135deg,#276749,#48bb78)}
.msg.user .msg-avatar{background:linear-gradient(135deg,#4299e1,#3182ce)}
.msg-bubble{padding:12px 16px;border-radius:16px;line-height:1.7;font-size:15px;word-break:break-word;position:relative}
.msg.bot .msg-bubble{background:#fff;color:#2d3748;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.msg.user .msg-bubble{background:linear-gradient(135deg,#276749,#48bb78);color:#fff;border-bottom-right-radius:4px}
.msg-thinking{color:#a0aec0;font-size:13px;font-style:italic;margin-bottom:6px;padding-bottom:6px;border-bottom:1px dashed #e2e8f0}
.msg-thinking-summary{color:#718096;font-size:13px;margin-bottom:4px}
.typing-cursor::after{content:'▊';animation:blink 1s infinite;color:#48bb78}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.welcome{background:linear-gradient(135deg,#f0fff4,#e6fffa);border-radius:16px;padding:24px;margin-bottom:12px;text-align:center}
.welcome h2{color:#1a4731;font-size:20px;margin-bottom:8px}
.welcome p{color:#4a5568;font-size:14px;line-height:1.6;margin-bottom:12px}
.welcome-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.welcome-tag{background:#fff;color:#276749;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .2s;border:1px solid #c6f6d5}
.welcome-tag:hover{background:#276749;color:#fff}
.input-area{padding:12px 0;display:flex;gap:10px;flex-shrink:0}
.input-area input{flex:1;padding:12px 18px;border:2px solid #c6f6d5;border-radius:24px;font-size:15px;outline:none;transition:border-color .2s}
.input-area input:focus{border-color:#48bb78}
.input-area button{padding:12px 24px;background:linear-gradient(135deg,#276749,#48bb78);color:#fff;border:none;border-radius:24px;font-size:15px;cursor:pointer;transition:all .2s;font-weight:600}
.input-area button:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(39,103,73,.3)}
.input-area button:disabled{opacity:.5;cursor:not-allowed;transform:none}
.bottom-bar{padding:10px 16px;text-align:center;flex-shrink:0}
.coze-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;background:linear-gradient(135deg,#276749,#48bb78);color:#fff;text-decoration:none;border-radius:24px;font-size:14px;font-weight:600;transition:all .2s;box-shadow:0 2px 8px rgba(39,103,73,.2)}
.coze-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(39,103,73,.35)}
@media(max-width:640px){
  .topbar{padding:10px 16px}
  .topbar h1{font-size:15px}
  .chat-wrap{padding:10px}
  .msg{max-width:92%}
  .welcome h2{font-size:17px}
}
</style>
</head>
<body>
<div class="topbar">
  <a href="index.html">&larr; 返回首页</a>
  <h1>学生AI答疑助手</h1>
  <span class="bot-tag">在线</span>
</div>
<div class="chat-wrap">
  <div class="msgs" id="msgs">
    <div class="welcome">
      <h2>计算机网络应用专业学生答疑小助手</h2>
      <p>遇到专业问题随时提问，涵盖网络设备配置、综合布线、网络安全等17门课程知识点</p>
      <div class="welcome-tags">
        <span class="welcome-tag" onclick="sendQuick('OSI七层模型每层的功能是什么？')">OSI七层模型</span>
        <span class="welcome-tag" onclick="sendQuick('子网掩码255.255.255.0怎么计算可用主机数？')">子网掩码计算</span>
        <span class="welcome-tag" onclick="sendQuick('双绞线T568B线序是什么？')">T568B线序</span>
      </div>
    </div>
  </div>
  <div class="input-area">
    <input id="input" type="text" placeholder="输入你的专业问题..." onkeydown="if(event.key==='Enter')send()">
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
  <div class="bottom-bar">
    <a class="coze-btn" href="https://www.coze.cn/s/jgZXDhiIMho/" target="_blank">进入COZE官方智能体 &rarr;</a>
  </div>
</div>
<script>
const BOT_ID='7645540020057374756';
const API_URL='https://api.coze.cn/v3/chat';
const TOKEN='sat_5fSxGjaYFMpx9nSlIhXwt9mCAxKUKtJbaEwfyCIW9lSewRnHKSa4Qs5QEg5Zr0RZ';
let userId='u_'+Math.random().toString(36).substr(2,8);
let conversationId=null;
let isStreaming=false;

function addMsg(role,html){
  const d=document.createElement('div');
  d.className='msg '+role;
  d.innerHTML=`<div class="msg-avatar">${role==='bot'?'🤖':'👤'}</div><div class="msg-bubble">${html}</div>`;
  document.getElementById('msgs').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
  return d;
}

function scrollBottom(){const m=document.getElementById('msgs');m.scrollTop=m.scrollHeight;}

async function send(){
  const input=document.getElementById('input');
  const text=input.value.trim();
  if(!text||isStreaming)return;
  input.value='';
  isStreaming=true;
  document.getElementById('sendBtn').disabled=true;
  addMsg('user',escHtml(text));
  const botDiv=addMsg('bot','<span class="typing-cursor">思考中...</span>');
  const bubble=botDiv.querySelector('.msg-bubble');
  let answerText='';
  let thinkingText='';
  let hasAnswer=false;

  try{
    const body={bot_id:BOT_ID,user_id:userId,stream:true,auto_save_history:true,additional_messages:[{role:'user',content:text,content_type:'text'}]};
    if(conversationId)body.conversation_id=conversationId;
    const resp=await fetch(API_URL,{method:'POST',headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},body:JSON.stringify(body)});
    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let buf='';

    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      buf+=decoder.decode(value,{stream:true});
      const lines=buf.split('\n');
      buf=lines.pop();

      let currentEvent='';
      for(const line of lines){
        if(line.startsWith('event:')){currentEvent=line.slice(6).trim();continue;}
        if(!line.startsWith('data:'))continue;
        const data=line.slice(5).trim();
        if(!data||data==='[DONE]')continue;
        try{
          const obj=JSON.parse(data);
          if(obj.conversation_id&&!conversationId)conversationId=obj.conversation_id;
          if(currentEvent==='conversation.message.delta'){
            if(obj.type==='answer'){hasAnswer=true;if(obj.content)answerText+=obj.content;}
            else if(obj.type==='verbose'&&obj.content){thinkingText+=obj.content;}
          }
          if(currentEvent==='conversation.message.completed'){
            if(obj.type==='answer'&&obj.content){answerText=obj.content;hasAnswer=true;}
          }
          let html='';
          if(thinkingText)html+=`<div class="msg-thinking-summary">💭 思考完成</div>`;
          if(answerText)html+=formatMsg(answerText);
          else if(!hasAnswer)html+=thinkingText?`<div class="msg-thinking">💭 ${escHtml(thinkingText.slice(-100))}...</div>`:'<span class="typing-cursor">思考中...</span>';
          bubble.innerHTML=html;
          scrollBottom();
        }catch(e){}
      }
    }
    let finalHtml='';
    if(thinkingText)finalHtml+=`<div class="msg-thinking-summary">💭 思考完成</div>`;
    finalHtml+=answerText?formatMsg(answerText):'抱歉，未获取到回复，请重试。';
    bubble.innerHTML=finalHtml;
    scrollBottom();
  }catch(e){
    bubble.innerHTML='⚠️ 网络错误，请稍后重试。也可<a href="https://www.coze.cn/s/jgZXDhiIMho/" target="_blank" style="color:#48bb78">点击进入COZE官方智能体</a>';
    console.error(e);
  }
  isStreaming=false;
  document.getElementById('sendBtn').disabled=false;
  input.focus();
}

function sendQuick(text){document.getElementById('input').value=text;send();}

function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML.replace(/\n/g,'<br>');}

function formatMsg(text){
  let html=escHtml(text);
  html=html.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  html=html.replace(/^### (.+)$/gm,'<div style="font-size:16px;font-weight:700;margin:8px 0 4px;color:#1a4731">$1</div>');
  html=html.replace(/^## (.+)$/gm,'<div style="font-size:17px;font-weight:700;margin:10px 0 4px;color:#1a4731">$1</div>');
  html=html.replace(/^[-*] (.+)$/gm,'<div style="padding-left:16px;margin:2px 0">• $1</div>');
  html=html.replace(/^(\d+)\. (.+)$/gm,'<div style="padding-left:16px;margin:2px 0">$1. $2</div>');
  return html;
}
</script>
</body>
</html>
